<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="2048">
<title>2048</title>
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--g:#33ff33;--gd:#1a8c1a;--bg:#070707;--glow:rgba(51,255,51,0.12);--amber:#ffaa00}
html,body{
  height:100%;height:100dvh;overflow:hidden;background:#000;touch-action:none;
  -webkit-user-select:none;user-select:none;-webkit-touch-callout:none;
  -webkit-tap-highlight-color:transparent;
}
body{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:'Press Start 2P',monospace;
  background:radial-gradient(ellipse at center,#0d0d0d 0%,#000 80%);color:var(--g);
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}
.crt::before{
  content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px);
  pointer-events:none;z-index:1000;
}
.crt::after{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,0.65) 100%);
  pointer-events:none;z-index:1001;
}
@keyframes titleGlow{
  0%,100%{text-shadow:0 0 2px #fff,0 0 8px var(--g),0 0 20px rgba(51,255,51,0.25)}
  50%{text-shadow:0 0 4px #fff,0 0 12px var(--g),0 0 30px rgba(51,255,51,0.35)}
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

.game-container{
  display:flex;flex-direction:column;align-items:center;
  width:100%;height:100%;height:100dvh;position:relative;
}
.topbar{
  display:flex;justify-content:space-between;align-items:center;
  width:100%;padding:6px 12px;flex-shrink:0;z-index:10;
}
.topbar-left{display:flex;flex-direction:column;gap:2px}
.title{font-size:14px;letter-spacing:4px;animation:titleGlow 3s ease-in-out infinite}
.score-text{font-size:7px;text-shadow:0 0 4px var(--g);line-height:1.8}
.score-text span{color:var(--amber);text-shadow:0 0 4px var(--amber)}
.topbar-right{display:flex;align-items:center;gap:10px}
.stat-box{text-align:center}
.stat-lbl{font-size:5px;letter-spacing:1px;opacity:0.6;text-shadow:0 0 3px var(--g)}
.stat-val{font-size:9px;color:var(--amber);text-shadow:0 0 5px var(--amber)}

.board-wrap{
  flex:1;display:flex;align-items:center;justify-content:center;
  width:100%;position:relative;padding:4px;
}
canvas#board{
  border:2px solid var(--gd);
  box-shadow:0 0 15px var(--glow),inset 0 0 25px rgba(0,0,0,0.4);
  image-rendering:pixelated;border-radius:2px;
}
.touch-hint{
  font-size:5px;letter-spacing:1px;opacity:0.3;text-align:center;
  padding:4px 0 8px 0;flex-shrink:0;text-shadow:0 0 3px var(--g);
}
.pause-btn{
  font-family:'Press Start 2P',monospace;font-size:9px;color:var(--gd);
  background:none;border:1px solid var(--gd);padding:8px 12px;border-radius:3px;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
}
.pause-btn:active{color:var(--g);border-color:var(--g)}

.overlay{
  position:fixed;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:rgba(0,0,0,0.88);z-index:500;gap:16px;text-align:center;
}
.overlay h1{font-size:22px;letter-spacing:5px;animation:titleGlow 2s ease-in-out infinite;color:#d0ffd0}
.overlay h2{font-size:13px;color:var(--amber);text-shadow:0 0 8px var(--amber)}
.overlay .sub{font-size:7px;line-height:2.4;opacity:0.7}
.overlay .start-hint{font-size:8px;animation:blink 1.2s step-end infinite;margin-top:12px}
.overlay .final-score{font-size:9px;line-height:2.4}
.overlay .final-score span{color:var(--amber);text-shadow:0 0 6px var(--amber)}
.hidden{display:none !important}
.pause-overlay{
  position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(0,0,0,0.85);z-index:400;gap:24px;
}
.pause-overlay .pause-text{font-size:14px;letter-spacing:4px;animation:blink 1.5s step-end infinite}
.pause-menu-btn{
  font-family:'Press Start 2P',monospace;font-size:8px;color:var(--gd);
  background:none;border:1px solid var(--gd);padding:10px 16px;border-radius:3px;
  cursor:pointer;-webkit-tap-highlight-color:transparent;letter-spacing:2px;
}
.pause-menu-btn:active{color:var(--g);border-color:var(--g)}
.pause-menu-btn.sel{color:var(--amber);border-color:var(--amber);text-shadow:0 0 6px var(--amber)}
.confirm-box{display:flex;flex-direction:column;align-items:center;gap:16px;padding:24px;border:1px solid var(--gd);background:rgba(7,7,7,0.95)}
.confirm-q{font-size:8px;letter-spacing:2px;line-height:2}
.confirm-btns{display:flex;gap:16px}
.confirm-yes,.confirm-no{font-family:'Press Start 2P',monospace;font-size:8px;padding:10px 18px;border-radius:3px;cursor:pointer;-webkit-tap-highlight-color:transparent;letter-spacing:2px;background:none}
.confirm-yes{color:var(--amber);border:1px solid var(--amber)}
.confirm-no{color:var(--gd);border:1px solid var(--gd)}
.confirm-yes.sel,.confirm-yes:active{background:rgba(255,170,0,0.15);color:#fff;border-color:#fff}
.confirm-no.sel,.confirm-no:active{background:rgba(51,255,51,0.1);color:var(--g);border-color:var(--g)}
</style>
</head>
<body class="crt">

<div class="overlay" id="startScreen">
  <h1>2048</h1>
  <div class="sub">SWIPE ←→↑↓ SLIDE TILES<br>MERGE SAME NUMBERS<br>REACH 2048 TO WIN!</div>
  <div class="start-hint">PRESS START</div>
</div>

<div class="overlay hidden" id="gameOver">
  <h2>GAME OVER</h2>
  <div class="final-score">SCORE <span id="finalScore">0</span><br>BEST <span id="finalBest">0</span></div>
  <div class="start-hint">PRESS RETRY</div>
</div>

<div class="overlay hidden" id="winScreen">
  <h2>YOU WIN!</h2>
  <div class="final-score">SCORE <span id="winScore">0</span></div>
  <div class="sub">TAP OR PRESS ENTER TO<br>KEEP PLAYING</div>
  <div class="start-hint">PRESS CONTINUE</div>
</div>

<div class="game-container" id="gameUI">
  <div class="topbar">
    <div class="topbar-left">
      <div class="title">2048</div>
      <div class="score-text">SCORE <span id="score">0</span> &nbsp;HI <span id="hi">0</span></div>
    </div>
    <button class="pause-btn" id="pauseBtn">PAUSE</button>
    <div class="topbar-right">
      <div class="stat-box"><div class="stat-lbl">BEST</div><div class="stat-val" id="best">0</div></div>
    </div>
  </div>
  <div class="board-wrap" id="boardWrap">
    <canvas id="board" width="320" height="320"></canvas>
  </div>
  <div class="touch-hint">SWIPE ←→↑↓ SLIDE &nbsp; MERGE TO 2048</div>
</div>

<div class="pause-overlay hidden" id="pauseOverlay">
  <div class="pause-text">PAUSE</div>
  <button class="pause-menu-btn" id="resumeBtn">RESUME</button>
  <button class="pause-menu-btn" id="menuBtn">EXIT TO MENU</button>
  <div class="confirm-box hidden" id="confirmBox">
    <div class="confirm-q">EXIT TO MENU?</div>
    <div class="confirm-btns">
      <button class="confirm-yes sel" id="confirmYes">YES</button>
      <button class="confirm-no" id="confirmNo">NO</button>
    </div>
  </div>
</div>

<script>
// ── Constants ──
const CW = 320, CH = 320;
const SIZE = 4;
const PAD = 8;      // outer padding
const GAP = 6;      // gap between cells
const CELL = (CW - PAD * 2 - GAP * (SIZE - 1)) / SIZE; // ~67px

const canvas = document.getElementById('board'), ctx = canvas.getContext('2d');

// Tile colors: value -> { bg, fg, border_light, border_dark }
const TILE_STYLES = {
  2:    { bg:'#1a8c1a', fg:'#33ff33', bh:'#33ff33', bd:'#0d5c0d' },
  4:    { bg:'#1a7c2a', fg:'#33ff33', bh:'#44ff44', bd:'#0d4c1a' },
  8:    { bg:'#1a6c3a', fg:'#33ff33', bh:'#44ffaa', bd:'#0d3c2a' },
  16:   { bg:'#0d6c4a', fg:'#33ffcc', bh:'#44ffcc', bd:'#0d3c3a' },
  32:   { bg:'#0d5c5a', fg:'#33ffdd', bh:'#44ffdd', bd:'#0d3c4a' },
  64:   { bg:'#1a5c0d', fg:'#66ff33', bh:'#88ff44', bd:'#0d3c0d' },
  128:  { bg:'#8c6c00', fg:'#ffcc33', bh:'#ffdd44', bd:'#5c4400' },
  256:  { bg:'#8c5c00', fg:'#ffbb33', bh:'#ffcc44', bd:'#5c3c00' },
  512:  { bg:'#8c4c00', fg:'#ffaa33', bh:'#ffbb44', bd:'#5c2c00' },
  1024: { bg:'#8c3c00', fg:'#ff9933', bh:'#ffaa44', bd:'#5c1c00' },
  2048: { bg:'#8c8c00', fg:'#ffff33', bh:'#ffff66', bd:'#5c5c00' },
  4096: { bg:'#8c1a1a', fg:'#ff5533', bh:'#ff7744', bd:'#5c0d0d' },
  8192: { bg:'#5c1a5c', fg:'#ff33ff', bh:'#ff66ff', bd:'#3c0d3c' },
};

// ── State ──
let grid, scoreVal, hiScore, gameRunning, paused, gameOver, won, keepPlaying;
let lastTime;
let comboStep = 0;
let moveAnimations = []; // [{fromR, fromC, toR, toC, val, progress}]
let mergeAnimations = []; // [{r, c, val, progress}]
let newTileAnim = null; // {r, c, val, progress}
let animating = false;

// ── Audio ──
let audioCtx;
function beep(f, d, v = 0.08) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = 'square'; o.frequency.value = f; g.gain.value = v;
    o.connect(g); g.connect(audioCtx.destination); o.start();
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + d);
    o.stop(audioCtx.currentTime + d);
  } catch (e) {}
}

// ── Grid logic ──
function emptyGrid() {
  return Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
}

function getEmpty(g) {
  const e = [];
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++)
      if (g[r][c] === 0) e.push([r, c]);
  return e;
}

function addRandom(g) {
  const e = getEmpty(g);
  if (!e.length) return null;
  const [r, c] = e[Math.floor(Math.random() * e.length)];
  g[r][c] = Math.random() < 0.9 ? 2 : 4;
  return { r, c, val: g[r][c] };
}

function slideRow(row) {
  let s = 0;
  const filtered = row.filter(v => v !== 0);
  const merged = [];
  const mergeIndices = [];
  for (let i = 0; i < filtered.length; i++) {
    if (i + 1 < filtered.length && filtered[i] === filtered[i + 1]) {
      merged.push(filtered[i] * 2);
      mergeIndices.push(merged.length - 1);
      s += filtered[i] * 2;
      i++;
    } else {
      merged.push(filtered[i]);
    }
  }
  while (merged.length < SIZE) merged.push(0);
  return { row: merged, score: s, mergeIndices };
}

function transpose(g) {
  return g[0].map((_, c) => g.map(row => row[c]));
}

function doMove(g, dir) {
  let totalScore = 0;
  let mergedValues = [];
  let newG;

  function collectRow(row) {
    const r = slideRow(row);
    totalScore += r.score;
    // Collect merged values from mergeIndices
    r.mergeIndices.forEach(i => { if (r.row[i]) mergedValues.push(r.row[i]); });
    return r.row;
  }

  if (dir === 'left') {
    newG = g.map(row => collectRow(row));
  } else if (dir === 'right') {
    newG = g.map(row => collectRow([...row].reverse()).reverse());
  } else if (dir === 'up') {
    let cols = transpose(g);
    cols = cols.map(col => collectRow(col));
    newG = transpose(cols);
  } else {
    let cols = transpose(g);
    cols = cols.map(col => collectRow([...col].reverse()).reverse());
    newG = transpose(cols);
  }

  const moved = JSON.stringify(newG) !== JSON.stringify(g);
  return { grid: newG, score: totalScore, moved, mergedValues };
}

function canMove(g) {
  for (const d of ['left', 'right', 'up', 'down']) {
    if (doMove(g, d).moved) return true;
  }
  return false;
}

function hasWon(g) {
  return g.some(row => row.some(v => v >= 2048));
}

// ── Handle move ──
function handleMove(dir) {
  if (!gameRunning || paused || gameOver) return;
  if (won && !keepPlaying) return;
  if (animating) return;

  const result = doMove(grid, dir);
  if (!result.moved) return;

  grid = result.grid;
  scoreVal += result.score;

  if (result.score > 0) {
    // C major scale: each consecutive merge climbs one step, slide without merge resets to do
    const SCALE = [261.6, 293.7, 329.6, 349.2, 392.0, 440.0, 493.9, 523.3, 587.3, 659.3, 698.5, 784.0];
    beep(SCALE[comboStep], 0.1, 0.1);
    comboStep = Math.min(comboStep + 1, SCALE.length - 1);
  } else {
    beep(180, 0.03, 0.03);
    comboStep = 0;
  }

  const added = addRandom(grid);

  if (scoreVal > hiScore) {
    hiScore = scoreVal;
    try { localStorage.setItem('2048_hi', hiScore); } catch (e) {}
  }

  if (hasWon(grid) && !won && !keepPlaying) {
    won = true;
    beep(880, 0.3, 0.12);
    showWin();
  } else if (!canMove(grid)) {
    gameOver = true;
    beep(100, 0.4, 0.15);
    showGameOver();
  }

  updateUI();
}

// ── Drawing ──
function cellX(c) { return PAD + c * (CELL + GAP); }
function cellY(r) { return PAD + r * (CELL + GAP); }

function drawTile(x, y, w, h, val) {
  const style = TILE_STYLES[val] || TILE_STYLES[2048];

  // Block body
  ctx.fillStyle = style.bg;
  ctx.fillRect(x + 1, y + 1, w - 2, h - 2);

  // Highlight (top-left)
  ctx.fillStyle = style.bh;
  ctx.globalAlpha = 0.3;
  ctx.fillRect(x + 2, y + 2, w - 6, 2);
  ctx.fillRect(x + 2, y + 2, 2, h - 6);
  ctx.globalAlpha = 1;

  // Shadow (bottom-right)
  ctx.fillStyle = style.bd;
  ctx.globalAlpha = 0.5;
  ctx.fillRect(x + 1, y + h - 3, w - 2, 2);
  ctx.fillRect(x + w - 3, y + 1, 2, h - 2);
  ctx.globalAlpha = 1;

  // Number
  ctx.fillStyle = style.fg;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const txt = String(val);
  let fontSize = 16;
  if (val >= 1024) fontSize = 10;
  else if (val >= 128) fontSize = 12;
  else if (val >= 16) fontSize = 14;
  ctx.font = fontSize + "px 'Press Start 2P',monospace";
  // Text shadow
  ctx.fillStyle = style.bd;
  ctx.fillText(txt, x + w / 2 + 1, y + h / 2 + 1);
  ctx.fillStyle = style.fg;
  ctx.fillText(txt, x + w / 2, y + h / 2);
}

function draw() {
  ctx.fillStyle = '#070707';
  ctx.fillRect(0, 0, CW, CH);

  // Grid background cells
  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      const x = cellX(c), y = cellY(r);
      ctx.fillStyle = '#111';
      ctx.fillRect(x, y, CELL, CELL);
      ctx.strokeStyle = '#1a3a1a';
      ctx.lineWidth = 1;
      ctx.strokeRect(x + 0.5, y + 0.5, CELL - 1, CELL - 1);
    }
  }

  // Tiles
  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      if (grid[r][c] === 0) continue;
      drawTile(cellX(c), cellY(r), CELL, CELL, grid[r][c]);
    }
  }
}

// ── UI ──
function updateUI() {
  document.getElementById('score').textContent = scoreVal;
  document.getElementById('hi').textContent = hiScore;
  document.getElementById('best').textContent = hiScore;
}

function showGameOver() {
  document.getElementById('finalScore').textContent = scoreVal;
  document.getElementById('finalBest').textContent = hiScore;
  document.getElementById('gameOver').classList.remove('hidden');
}

function showWin() {
  document.getElementById('winScore').textContent = scoreVal;
  document.getElementById('winScreen').classList.remove('hidden');
}

// ── Keyboard ──
document.addEventListener('keydown', e => {
  // Confirm dialog open
  if (!document.getElementById('confirmBox').classList.contains('hidden')) {
    if (e.key === 'ArrowLeft' || e.key === 'y' || e.key === 'Y') { e.preventDefault(); confirmSel=0; updateConfirmSel(); }
    else if (e.key === 'ArrowRight' || e.key === 'n' || e.key === 'N') { e.preventDefault(); confirmSel=1; updateConfirmSel(); }
    else if (e.key === 'Enter') { e.preventDefault(); if (confirmSel===0) window.location.href='index.html'; else hideConfirm(); }
    else if (e.key === 'Escape') { e.preventDefault(); hideConfirm(); }
    return;
  }
  // Pause menu navigation
  if (paused) {
    if (e.key === 'ArrowDown' || e.key === 'ArrowUp') { e.preventDefault(); pauseSel = pauseSel===0 ? 1 : 0; updatePauseSel(); return; }
    if (e.key === 'Enter') { e.preventDefault(); if (pauseSel===1) showConfirm(); else togglePause(); return; }
    if (e.key === 'Escape' || e.key === 'p' || e.key === 'P') { e.preventDefault(); togglePause(); return; }
    return;
  }
  if (e.key === 'p' || e.key === 'P' || e.key === 'Escape') { e.preventDefault(); togglePause(); return; }
  if (!gameRunning || paused) return;
  const map = { ArrowLeft: 'left', ArrowRight: 'right', ArrowUp: 'up', ArrowDown: 'down' };
  if (map[e.key]) { e.preventDefault(); handleMove(map[e.key]); }
});

// ── Touch: swipe on board area ──
const bw = document.getElementById('boardWrap');
let tx, ty, tt, moved;
const SWIPE_THRESHOLD = 30;

bw.addEventListener('touchstart', e => {
  if (!gameRunning || paused || e.target.id === 'pauseBtn') return;
  e.preventDefault();
  const t = e.touches[0];
  tx = t.clientX; ty = t.clientY; tt = Date.now();
  moved = false;
}, { passive: false });

bw.addEventListener('touchmove', e => {
  if (!gameRunning || paused) return;
  e.preventDefault();
}, { passive: false });

bw.addEventListener('touchend', e => {
  if (!gameRunning || paused) return;
  e.preventDefault();
  const ct = e.changedTouches[0];
  const dx = ct.clientX - tx;
  const dy = ct.clientY - ty;
  const el = Date.now() - tt;

  if (Math.abs(dx) < SWIPE_THRESHOLD && Math.abs(dy) < SWIPE_THRESHOLD) return;

  if (Math.abs(dx) > Math.abs(dy)) {
    handleMove(dx > 0 ? 'right' : 'left');
  } else {
    handleMove(dy > 0 ? 'down' : 'up');
  }
}, { passive: false });

// ── Pause ──
const pauseOv = document.getElementById('pauseOverlay');
let pauseSel = 0;
function updatePauseSel() { document.getElementById('resumeBtn').classList.toggle('sel', pauseSel === 0); document.getElementById('menuBtn').classList.toggle('sel', pauseSel === 1); }
function togglePause() {
  if (!gameRunning || gameOver) return;
  paused = !paused;
  pauseOv.classList.toggle('hidden', !paused);
  if (!paused) { lastTime = 0; requestAnimationFrame(gameLoop); }
  else { pauseSel = 0; updatePauseSel(); }
}
document.getElementById('pauseBtn').addEventListener('click', e => { e.stopPropagation(); togglePause(); });
document.getElementById('pauseBtn').addEventListener('touchend', e => { e.stopPropagation(); e.preventDefault(); togglePause(); });
pauseOv.addEventListener('click', e => { if (!['resumeBtn','menuBtn','confirmYes','confirmNo'].includes(e.target.id) && !e.target.closest('#confirmBox')) togglePause(); });
pauseOv.addEventListener('touchend', e => { if (!['resumeBtn','menuBtn','confirmYes','confirmNo'].includes(e.target.id) && !e.target.closest('#confirmBox')) { e.preventDefault(); togglePause(); } });
['click', 'touchend'].forEach(ev => document.getElementById('resumeBtn').addEventListener(ev, e => { e.stopPropagation(); e.preventDefault(); togglePause(); }));
// Confirm exit
let confirmSel=0; // 0=YES 1=NO
function showConfirm(){
  document.getElementById('confirmBox').classList.remove('hidden');
  confirmSel=0;updateConfirmSel();
}
function hideConfirm(){document.getElementById('confirmBox').classList.add('hidden');}
function updateConfirmSel(){
  document.getElementById('confirmYes').classList.toggle('sel',confirmSel===0);
  document.getElementById('confirmNo').classList.toggle('sel',confirmSel===1);
}
['click', 'touchend'].forEach(ev => document.getElementById('menuBtn').addEventListener(ev, e => { e.stopPropagation(); e.preventDefault(); showConfirm(); }));
['click', 'touchend'].forEach(ev => document.getElementById('confirmYes').addEventListener(ev, e => { e.stopPropagation(); e.preventDefault(); window.location.href = 'index.html'; }));
['click', 'touchend'].forEach(ev => document.getElementById('confirmNo').addEventListener(ev, e => { e.stopPropagation(); e.preventDefault(); hideConfirm(); }));

// ── Game loop ──
function gameLoop(time) {
  if (!gameRunning) { draw(); return; }
  if (paused) return;
  draw();
  requestAnimationFrame(gameLoop);
}

// ── Start / Restart ──
function startGame() {
  grid = emptyGrid();
  scoreVal = 0;
  gameOver = false;
  won = false;
  keepPlaying = false;
  gameRunning = true;
  paused = false;
  lastTime = 0;
  comboStep = 0;
  try { hiScore = parseInt(localStorage.getItem('2048_hi')) || 0; } catch (e) { hiScore = 0; }
  addRandom(grid);
  addRandom(grid);
  updateUI();
  draw();
  requestAnimationFrame(gameLoop);
}

function continueGame() {
  keepPlaying = true;
  won = false;
  document.getElementById('winScreen').classList.add('hidden');
}

// Overlay listeners
['click', 'touchend'].forEach(ev => {
  document.getElementById('startScreen').addEventListener(ev, e => {
    e.preventDefault(); document.getElementById('startScreen').classList.add('hidden'); startGame();
  });
  document.getElementById('gameOver').addEventListener(ev, e => {
    e.preventDefault(); document.getElementById('gameOver').classList.add('hidden'); startGame();
  });
  document.getElementById('winScreen').addEventListener(ev, e => {
    e.preventDefault(); continueGame();
  });
});
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ' ') {
    const start = document.getElementById('startScreen');
    const over = document.getElementById('gameOver');
    const win = document.getElementById('winScreen');
    if (!start.classList.contains('hidden')) { e.preventDefault(); start.classList.add('hidden'); startGame(); }
    else if (!over.classList.contains('hidden')) { e.preventDefault(); over.classList.add('hidden'); startGame(); }
    else if (!win.classList.contains('hidden')) { e.preventDefault(); continueGame(); }
  }
});

// ── Resize ──
function resize() {
  const wrap = document.getElementById('boardWrap');
  const aH = wrap.clientHeight - 8, aW = wrap.clientWidth - 8;
  const ASPECT = CH / CW; // 1:1
  let w = aW, h = w * ASPECT;
  if (h > aH) { h = aH; w = h / ASPECT; }
  canvas.style.width = Math.floor(w) + 'px';
  canvas.style.height = Math.floor(h) + 'px';
}
window.addEventListener('resize', resize);
setTimeout(resize, 50); setTimeout(resize, 200); resize();
document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
ctx.fillStyle = '#070707'; ctx.fillRect(0, 0, CW, CH);
</script>
