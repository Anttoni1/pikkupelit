<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ARKANOID">
<title>ARKANOID</title>
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--g:#33ff33;--gd:#1a8c1a;--bg:#070707;--glow:rgba(51,255,51,0.12);--amber:#ffaa00}
html,body{
  height:100%;height:100dvh;overflow:hidden;background:#000;touch-action:none;
  -webkit-user-select:none;user-select:none;-webkit-touch-callout:none;
  -webkit-tap-highlight-color:transparent;
}
body{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:'Press Start 2P',monospace;
  background:radial-gradient(ellipse at center,#0d0d0d 0%,#000 80%);color:var(--g);
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}
.crt::before{
  content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px);
  pointer-events:none;z-index:1000;
}
.crt::after{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,0.65) 100%);
  pointer-events:none;z-index:1001;
}
@keyframes titleGlow{
  0%,100%{text-shadow:0 0 2px #fff,0 0 8px var(--g),0 0 20px rgba(51,255,51,0.25)}
  50%{text-shadow:0 0 4px #fff,0 0 12px var(--g),0 0 30px rgba(51,255,51,0.35)}
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

.game-container{
  display:flex;flex-direction:column;align-items:center;
  width:100%;height:100%;height:100dvh;position:relative;
}
.topbar{
  display:flex;justify-content:space-between;align-items:center;
  width:100%;padding:6px 12px;flex-shrink:0;z-index:10;
}
.topbar-left{display:flex;flex-direction:column;gap:2px}
.title{font-size:14px;letter-spacing:4px;animation:titleGlow 3s ease-in-out infinite}
.score-text{font-size:7px;text-shadow:0 0 4px var(--g);line-height:1.8}
.score-text span{color:var(--amber);text-shadow:0 0 4px var(--amber)}
.topbar-right{display:flex;align-items:center;gap:10px}
.stat-box{text-align:center}
.stat-lbl{font-size:5px;letter-spacing:1px;opacity:0.6;text-shadow:0 0 3px var(--g)}
.stat-val{font-size:9px;color:var(--amber);text-shadow:0 0 5px var(--amber)}

.board-wrap{
  flex:1;display:flex;align-items:center;justify-content:center;
  width:100%;position:relative;padding:4px;
}
canvas#board{
  border:2px solid var(--gd);
  box-shadow:0 0 15px var(--glow),inset 0 0 25px rgba(0,0,0,0.4);
  image-rendering:pixelated;border-radius:2px;
}
.touch-hint{
  font-size:5px;letter-spacing:1px;opacity:0.3;text-align:center;
  padding:4px 0 8px 0;flex-shrink:0;text-shadow:0 0 3px var(--g);
}
.pause-btn{
  font-family:'Press Start 2P',monospace;font-size:9px;color:var(--gd);
  background:none;border:1px solid var(--gd);padding:8px 12px;border-radius:3px;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
}
.pause-btn:active{color:var(--g);border-color:var(--g)}

.overlay{
  position:fixed;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:rgba(0,0,0,0.88);z-index:500;gap:16px;text-align:center;
}
.overlay h1{font-size:22px;letter-spacing:5px;animation:titleGlow 2s ease-in-out infinite;color:#d0ffd0}
.overlay h2{font-size:13px;color:var(--amber);text-shadow:0 0 8px var(--amber)}
.overlay .sub{font-size:7px;line-height:2.4;opacity:0.7}
.overlay .start-hint{font-size:8px;animation:blink 1.2s step-end infinite;margin-top:12px}
.overlay .final-score{font-size:9px;line-height:2.4}
.overlay .final-score span{color:var(--amber);text-shadow:0 0 6px var(--amber)}
.hidden{display:none !important}
.pause-overlay{
  position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(0,0,0,0.85);z-index:400;gap:24px;
}
.pause-overlay .pause-text{font-size:14px;letter-spacing:4px;animation:blink 1.5s step-end infinite}
.pause-menu-btn{
  font-family:'Press Start 2P',monospace;font-size:8px;color:var(--gd);
  background:none;border:1px solid var(--gd);padding:10px 16px;border-radius:3px;
  cursor:pointer;-webkit-tap-highlight-color:transparent;letter-spacing:2px;
}
.pause-menu-btn:active{color:var(--g);border-color:var(--g)}
.pause-menu-btn.sel{color:var(--amber);border-color:var(--amber);text-shadow:0 0 6px var(--amber)}
.confirm-box{display:flex;flex-direction:column;align-items:center;gap:16px;padding:24px;border:1px solid var(--gd);background:rgba(7,7,7,0.95)}
.confirm-q{font-size:8px;letter-spacing:2px;line-height:2}
.confirm-btns{display:flex;gap:16px}
.confirm-yes,.confirm-no{font-family:'Press Start 2P',monospace;font-size:8px;padding:10px 18px;border-radius:3px;cursor:pointer;-webkit-tap-highlight-color:transparent;letter-spacing:2px;background:none}
.confirm-yes{color:var(--amber);border:1px solid var(--amber)}
.confirm-no{color:var(--gd);border:1px solid var(--gd)}
.confirm-yes.sel,.confirm-yes:active{background:rgba(255,170,0,0.15);color:#fff;border-color:#fff}
.confirm-no.sel,.confirm-no:active{background:rgba(51,255,51,0.1);color:var(--g);border-color:var(--g)}
</style>
</head>
<body class="crt">

<div class="overlay" id="startScreen">
  <h1>ARKANOID</h1>
  <div class="sub">← → SWIPE MOVE PADDLE<br>TAP = LAUNCH / FIRE<br>BREAK ALL BRICKS!<br>CATCH POWERUPS!</div>
  <div class="start-hint">TAP TO START</div>
</div>

<div class="overlay hidden" id="gameOver">
  <h2>GAME OVER</h2>
  <div class="final-score">SCORE <span id="finalScore">0</span><br>LEVEL <span id="finalLevel">1</span><br>BRICKS <span id="finalBricks">0</span></div>
  <button class="pause-menu-btn sel" id="goRetryBtn">RETRY</button>
  <button class="pause-menu-btn" id="goMenuBtn">EXIT TO MENU</button>
</div>

<div class="overlay hidden" id="winScreen">
  <h2>ALL CLEAR!</h2>
  <div class="final-score">SCORE <span id="winScore">0</span><br>LEVEL <span id="winLevel">1</span></div>
  <button class="pause-menu-btn sel" id="winContinueBtn">CONTINUE</button>
  <button class="pause-menu-btn" id="winMenuBtn">EXIT TO MENU</button>
</div>

<div class="game-container" id="gameUI">
  <div class="topbar">
    <div class="topbar-left">
      <div class="title">ARKANOID</div>
      <div class="score-text">SCORE <span id="score">0</span> &nbsp;HI <span id="hi">0</span></div>
    </div>
    <button class="pause-btn" id="pauseBtn">PAUSE</button>
    <div class="topbar-right">
      <div class="stat-box"><div class="stat-lbl">LV</div><div class="stat-val" id="level">1</div></div>
      <div class="stat-box"><div class="stat-lbl">LIVES</div><div class="stat-val" id="lives">3</div></div>
    </div>
  </div>
  <div class="board-wrap" id="boardWrap">
    <canvas id="board" width="300" height="320"></canvas>
  </div>
  <div class="touch-hint" id="touchHint">SWIPE ←→ MOVE &nbsp; TAP LAUNCH</div>
</div>

<div class="pause-overlay hidden" id="pauseOverlay">
  <div class="pause-text">PAUSE</div>
  <button class="pause-menu-btn" id="resumeBtn">RESUME</button>
  <button class="pause-menu-btn" id="menuBtn">EXIT TO MENU</button>
  <div class="confirm-box hidden" id="confirmBox">
    <div class="confirm-q">EXIT TO MENU?</div>
    <div class="confirm-btns">
      <button class="confirm-yes sel" id="confirmYes">YES</button>
      <button class="confirm-no" id="confirmNo">NO</button>
    </div>
  </div>
</div>

<script>
// ── Constants ──
const CW = 300, CH = 320;
const BRICK_COLS = 10, MAX_BRICK_ROWS = 12;
const BRICK_W = 29, BRICK_H = 13, BRICK_PAD = 1;
const BRICK_OFFSET_X = (CW - BRICK_COLS * (BRICK_W + BRICK_PAD) + BRICK_PAD) / 2;
const BRICK_OFFSET_Y = 30;
const PADDLE_DEFAULT_W = 50, PADDLE_H = 8;
const BALL_R = 4;
const PADDLE_Y_OFFSET = 55;

const canvas = document.getElementById('board'), ctx = canvas.getContext('2d');

// Row colors for normal bricks
const ROW_COLORS = ['#33ff33','#00ffaa','#22ff88','#66ff66','#00cc66','#44ffcc',
                    '#33ff33','#00ffaa','#22ff88','#66ff66','#00cc66','#44ffcc'];

// Brick types: 0=empty, 1=normal, 2+=silver(hits left), -1=gold, 5=rainbow
const B_EMPTY = 0, B_NORMAL = 1, B_GOLD = -1, B_RAINBOW = 5;
// Silver: value 2,3,4 = hits remaining

// ── Powerup definitions ──
const P_ENLARGE = 0, P_SHRINK = 1, P_MULTI = 2, P_LASER = 3, P_STICKY = 4, P_LIFE = 5, P_SLOW = 6;
const POWERUP_DEFS = [
  { id: P_ENLARGE, letter: 'E', color: '#33ff33',  timed: false },
  { id: P_SHRINK,  letter: 'S', color: '#ff3333',  timed: false },
  { id: P_MULTI,   letter: 'M', color: '#00ffaa',  timed: false },
  { id: P_LASER,   letter: 'L', color: '#ff6600',  timed: true,  dur: 10000 },
  { id: P_STICKY,  letter: 'C', color: '#ffff33',  timed: true,  dur: 10000 },
  { id: P_LIFE,    letter: '1', color: '#ff33ff',  timed: false },
  { id: P_SLOW,    letter: 'W', color: '#33ffff',  timed: true,  dur: 10000 },
];
// Weights for random selection (indexed by powerup id)
const POWERUP_WEIGHTS = [15, 10, 14, 14, 14, 5, 14]; // shrink lower, life rare

// ── Level layouts ──
// . = empty, # = normal, S = silver(2-hit), G = gold, R = rainbow
const LEVELS = [
  // Level 1: Classic
  [
    '..........',
    '##########',
    '##########',
    '##########',
    '##########',
  ],
  // Level 2: Pyramid
  [
    '....##....',
    '...####...',
    '..######..',
    '.########.',
    '##########',
  ],
  // Level 3: Fortress (gold only on bottom row, flanked by normal bricks)
  [
    '##########',
    '##########',
    '##########',
    '##########',
    '#GGGGGGGG#',
  ],
  // Level 4: Checkerboard
  [
    '#.#.#.#.#.',
    '.#.#.#.#.#',
    '#.#.#.#.#.',
    '.#.#.#.#.#',
    '#.#.#.#.#.',
    '.#.#.#.#.#',
  ],
  // Level 5: Silver Wall
  [
    'SSSSSSSSSS',
    'SSSSSSSSSS',
    '##########',
    '##########',
  ],
  // Level 6: Diamond
  [
    '....##....',
    '...####...',
    '..##RR##..',
    '.###RR###.',
    '..######..',
    '...####...',
    '....##....',
  ],
  // Level 7: Corridors
  [
    '#G##G##G##',
    '#G##G##G##',
    '#G##G##G##',
    '#G##G##G##',
    '#G##G##G##',
    '#G##G##G##',
  ],
  // Level 8: Invader
  [
    '..#....#..',
    '...#..#...',
    '..######..',
    '.##SS####.',
    '##########',
    '#.######.#',
    '#.#....#.#',
    '...#..#...',
  ],
  // Level 9: Gauntlet
  [
    'GSSSSSSSSG',
    'G........G',
    'GSGSGSGSGG',
    'G........G',
    'GSSSSSSSSG',
    '##########',
    '##########',
  ],
  // Level 10: Final
  [
    'GRRRRRRRRG',
    'SSSSSSSSSS',
    'G#S##S##SG',
    '##########',
    'G#S##S##SG',
    'SSSSSSSSSS',
    'GRRRRRRRRG',
  ],
];

// ── State ──
let paddleX, paddleW, scoreVal, levelVal, livesVal, hiScore;
let balls, powerups, lasers;
let bricks, brickRows;
let gameRunning, paused, lastTime, lastDt;
let totalBricksCleared;
let activePower, powerTimer; // current timed powerup id (or null), ms remaining
let laserMode, stickyMode, slowMode;
let ballSpeed, rainbowFrame;
let shownWinScreen; // track if ALL CLEAR was shown this run

// ── Audio ──
let audioCtx;
function beep(f, d, v = 0.08) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = 'square'; o.frequency.value = f; g.gain.value = v;
    o.connect(g); g.connect(audioCtx.destination); o.start();
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + d);
    o.stop(audioCtx.currentTime + d);
  } catch (e) {}
}

// ── Brick helpers ──
function parseLevelLayout(lvIndex) {
  const layout = LEVELS[lvIndex % LEVELS.length];
  const silverHits = lvIndex >= 10 ? 3 : 2;
  const grid = [];
  for (let r = 0; r < layout.length; r++) {
    grid[r] = [];
    for (let c = 0; c < BRICK_COLS; c++) {
      const ch = c < layout[r].length ? layout[r][c] : '.';
      if (ch === '#') grid[r][c] = B_NORMAL;
      else if (ch === 'S') grid[r][c] = silverHits; // 2 or 3 = hits remaining
      else if (ch === 'G') grid[r][c] = B_GOLD;
      else if (ch === 'R') grid[r][c] = B_RAINBOW;
      else grid[r][c] = B_EMPTY;
    }
  }
  return grid;
}

function bricksRemaining() {
  let n = 0;
  for (let r = 0; r < brickRows; r++)
    for (let c = 0; c < BRICK_COLS; c++) {
      const v = bricks[r][c];
      if (v !== B_EMPTY && v !== B_GOLD) n++;
    }
  return n;
}

function brickX(c) { return BRICK_OFFSET_X + c * (BRICK_W + BRICK_PAD); }
function brickY(r) { return BRICK_OFFSET_Y + r * (BRICK_H + BRICK_PAD); }

function isSilver(v) { return v >= 2 && v !== B_RAINBOW; }

// ── Ball management ──
function createBall(x, y, vx, vy, launched) {
  return { x, y, vx, vy, launched, stickyOffset: 0 };
}

function pTop() { return CH - PADDLE_Y_OFFSET - PADDLE_H; }

function resetBallOnPaddle() {
  const b = createBall(paddleX + paddleW / 2, pTop() - BALL_R, 0, 0, false);
  b.stickyOffset = paddleW * 0.1; // slight right of center → launches right
  balls = [b];
}

function launchBall(b) {
  if (b.launched) return false;
  b.launched = true;
  const bx = paddleX + paddleW / 2 + b.stickyOffset;
  const hit = Math.max(0, Math.min(1, (bx - paddleX) / paddleW));
  const angle = -Math.PI * 0.15 - Math.PI * 0.7 * (1 - hit);
  const spd = getEffectiveBallSpeed();
  b.vx = Math.cos(angle) * spd;
  b.vy = Math.sin(angle) * spd;
  beep(440, 0.06);
  return true;
}

function getEffectiveBallSpeed() {
  const base = ballSpeed;
  return slowMode ? base * 0.7 : base;
}

// ── Powerup helpers ──
function dropChance() {
  return Math.max(0.12, 0.25 - (levelVal - 1) * 0.01);
}

function pickRandomPowerup() {
  const totalW = POWERUP_WEIGHTS.reduce((a, b) => a + b, 0);
  let r = Math.random() * totalW;
  for (let i = 0; i < POWERUP_WEIGHTS.length; i++) {
    r -= POWERUP_WEIGHTS[i];
    if (r <= 0) return i;
  }
  return 0;
}

function spawnPowerup(x, y) {
  const type = pickRandomPowerup();
  powerups.push({ x, y, type });
}

function clearTimedPower() {
  // Revert effects
  if (activePower === P_LASER) laserMode = false;
  if (activePower === P_STICKY) stickyMode = false;
  if (activePower === P_SLOW) {
    slowMode = false;
    // Rescale in-flight balls back to normal speed
    for (const b of balls) {
      if (!b.launched) continue;
      const spd = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
      if (spd > 0) {
        const target = getEffectiveBallSpeed(); // slowMode is now false, returns normal speed
        const factor = target / spd;
        b.vx *= factor;
        b.vy *= factor;
      }
    }
  }
  activePower = null;
  powerTimer = 0;
  updateTouchHint();
}

function applyPowerup(type) {
  const def = POWERUP_DEFS[type];
  beep(880, 0.1, 0.1);
  scoreVal += 100;

  const MIN_PADDLE = Math.floor(PADDLE_DEFAULT_W / 3);

  // Instant powerups
  if (type === P_LIFE) {
    livesVal = Math.min(5, livesVal + 1);
    updateUI();
    return;
  }
  if (type === P_MULTI) {
    const newBalls = [];
    for (const b of balls) {
      if (!b.launched) continue;
      const spd = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
      const ang = Math.atan2(b.vy, b.vx);
      newBalls.push(createBall(b.x, b.y, Math.cos(ang + 0.35) * spd, Math.sin(ang + 0.35) * spd, true));
      newBalls.push(createBall(b.x, b.y, Math.cos(ang - 0.35) * spd, Math.sin(ang - 0.35) * spd, true));
    }
    balls.push(...newBalls);
    return;
  }
  if (type === P_ENLARGE) {
    const oldCenter = paddleX + paddleW / 2;
    paddleW = Math.min(CW, paddleW + 15);
    paddleX = Math.max(0, Math.min(CW - paddleW, oldCenter - paddleW / 2));
    return;
  }
  if (type === P_SHRINK) {
    const oldCenter = paddleX + paddleW / 2;
    paddleW = Math.max(MIN_PADDLE, paddleW - 10);
    paddleX = Math.max(0, Math.min(CW - paddleW, oldCenter - paddleW / 2));
    return;
  }

  // Timed powerup — clear previous
  if (activePower !== null) clearTimedPower();
  activePower = type;
  powerTimer = def.dur;

  if (type === P_LASER) {
    laserMode = true;
  } else if (type === P_STICKY) {
    stickyMode = true;
  } else if (type === P_SLOW) {
    slowMode = true;
    // Adjust existing ball speeds
    for (const b of balls) {
      if (!b.launched) continue;
      const spd = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
      if (spd > 0) {
        const target = getEffectiveBallSpeed();
        const factor = target / spd;
        b.vx *= factor;
        b.vy *= factor;
      }
    }
  }
  updateTouchHint();
}

function clearAllPowerEffects() {
  if (activePower !== null) clearTimedPower();
  laserMode = false;
  stickyMode = false;
  slowMode = false;
  activePower = null;
  powerTimer = 0;
  lasers = [];
  powerups = [];
  updateTouchHint();
}

function updateTouchHint() {
  const hint = document.getElementById('touchHint');
  if (laserMode) hint.textContent = 'SWIPE ←→ MOVE   TAP FIRE';
  else hint.textContent = 'SWIPE ←→ MOVE   TAP LAUNCH';
}

// ── Tap action (context-sensitive) ──
function tapAction() {
  if (!gameRunning || paused) return;
  // Try to launch an unlaunched ball first
  for (const b of balls) {
    if (!b.launched) { launchBall(b); return; }
  }
  // If laser mode, fire
  if (laserMode && lasers.length < 3) {
    lasers.push({ x: paddleX + 8, y: pTop() - 4 });
    lasers.push({ x: paddleX + paddleW - 8, y: pTop() - 4 });
    beep(550, 0.03);
  }
}

// ── Collision ──
function checkBrickCollision(b) {
  for (let r = 0; r < brickRows; r++) {
    for (let c = 0; c < BRICK_COLS; c++) {
      const v = bricks[r][c];
      if (v === B_EMPTY) continue;
      const bx = brickX(c), by = brickY(r);
      const cx = Math.max(bx, Math.min(b.x, bx + BRICK_W));
      const cy = Math.max(by, Math.min(b.y, by + BRICK_H));
      const dx = b.x - cx, dy = b.y - cy;
      if (dx * dx + dy * dy < BALL_R * BALL_R) {
        // Hit! Determine what happens
        if (v === B_GOLD) {
          // Indestructible — just bounce
          beep(200, 0.06);
        } else if (isSilver(v)) {
          bricks[r][c] = v - 1;
          if (bricks[r][c] <= 0) {
            bricks[r][c] = B_EMPTY;
            scoreVal += 25 * levelVal;
            totalBricksCleared++;
            if (Math.random() < 0.4) spawnPowerup(bx + BRICK_W / 2, by + BRICK_H);
            beep(660, 0.06, 0.1);
          } else {
            beep(330, 0.04);
          }
        } else if (v === B_RAINBOW) {
          bricks[r][c] = B_EMPTY;
          scoreVal += 50 * levelVal;
          totalBricksCleared++;
          spawnPowerup(bx + BRICK_W / 2, by + BRICK_H); // guaranteed
          beep(660, 0.06, 0.12);
        } else {
          // Normal
          bricks[r][c] = B_EMPTY;
          scoreVal += 10 * levelVal;
          totalBricksCleared++;
          if (Math.random() < dropChance()) spawnPowerup(bx + BRICK_W / 2, by + BRICK_H);
          beep(660, 0.06, 0.1);
        }

        // Bounce
        const prevX = b.x - b.vx * lastDt / 1000 * 60;
        const prevY = b.y - b.vy * lastDt / 1000 * 60;
        const wasLeft = prevX < bx;
        const wasRight = prevX > bx + BRICK_W;
        const wasAbove = prevY < by;
        const wasBelow = prevY > by + BRICK_H;
        if (wasAbove || wasBelow) {
          b.vy = -b.vy;
          if (wasAbove) b.y = by - BALL_R;
          else b.y = by + BRICK_H + BALL_R;
        } else if (wasLeft || wasRight) {
          b.vx = -b.vx;
          if (wasLeft) b.x = bx - BALL_R;
          else b.x = bx + BRICK_W + BALL_R;
        } else {
          b.vy = -b.vy;
        }
        return true;
      }
    }
  }
  return false;
}

// ── Laser-brick collision ──
function checkLaserBrickCollision(laser) {
  for (let r = 0; r < brickRows; r++) {
    for (let c = 0; c < BRICK_COLS; c++) {
      const v = bricks[r][c];
      if (v === B_EMPTY || v === B_GOLD) continue;
      const bx = brickX(c), by = brickY(r);
      if (laser.x >= bx && laser.x <= bx + BRICK_W && laser.y >= by && laser.y <= by + BRICK_H) {
        if (isSilver(v)) {
          bricks[r][c] = v - 1;
          if (bricks[r][c] <= 0) {
            bricks[r][c] = B_EMPTY;
            scoreVal += 25 * levelVal;
            totalBricksCleared++;
            if (Math.random() < 0.4) spawnPowerup(bx + BRICK_W / 2, by + BRICK_H);
          }
        } else if (v === B_RAINBOW) {
          bricks[r][c] = B_EMPTY;
          scoreVal += 50 * levelVal;
          totalBricksCleared++;
          spawnPowerup(bx + BRICK_W / 2, by + BRICK_H);
        } else {
          bricks[r][c] = B_EMPTY;
          scoreVal += 10 * levelVal;
          totalBricksCleared++;
          if (Math.random() < dropChance()) spawnPowerup(bx + BRICK_W / 2, by + BRICK_H);
        }
        beep(660, 0.04, 0.08);
        return true; // laser consumed
      }
    }
  }
  return false;
}

// ── Update ──
function update(dt) {
  lastDt = dt;
  const step = dt / 1000;
  rainbowFrame++;

  // Clamp paddle
  paddleX = Math.max(0, Math.min(CW - paddleW, paddleX));

  // Powerup timer
  if (activePower !== null && powerTimer > 0) {
    powerTimer -= dt;
    if (powerTimer <= 0) {
      beep(300, 0.08);
      clearTimedPower();
    }
  }

  // Update powerup capsules
  const fallSpeed = Math.min(2.5, 1.5 + (levelVal - 1) * 0.05) * step * 60;
  for (let i = powerups.length - 1; i >= 0; i--) {
    const p = powerups[i];
    p.y += fallSpeed;
    // Catch check — paddle collision
    if (p.y + 5 >= pTop() && p.y - 5 <= pTop() + PADDLE_H &&
        p.x + 10 >= paddleX && p.x - 10 <= paddleX + paddleW) {
      applyPowerup(p.type);
      powerups.splice(i, 1);
      continue;
    }
    // Off screen
    if (p.y > CH + 10) { powerups.splice(i, 1); }
  }

  // Update lasers
  for (let i = lasers.length - 1; i >= 0; i--) {
    const l = lasers[i];
    l.y -= 6 * step * 60;
    if (l.y < 0) { lasers.splice(i, 1); continue; }
    if (checkLaserBrickCollision(l)) { lasers.splice(i, 1); }
  }

  // Update balls
  const pt = pTop();
  for (let i = balls.length - 1; i >= 0; i--) {
    const b = balls[i];

    if (!b.launched) {
      b.x = paddleX + paddleW / 2 + b.stickyOffset;
      b.y = pt - BALL_R;
      continue;
    }

    // Sub-stepping
    const moveX = Math.abs(b.vx * step * 60);
    const moveY = Math.abs(b.vy * step * 60);
    const maxMove = Math.max(moveX, moveY);
    const subSteps = Math.max(1, Math.ceil(maxMove / BALL_R));
    const subDt = dt / subSteps;
    let lost = false;

    for (let s = 0; s < subSteps; s++) {
      const ss = subDt / 1000;
      b.x += b.vx * ss * 60;
      b.y += b.vy * ss * 60;

      // Wall bounce
      if (b.x - BALL_R <= 0) { b.x = BALL_R; b.vx = Math.abs(b.vx); beep(220, 0.03); }
      if (b.x + BALL_R >= CW) { b.x = CW - BALL_R; b.vx = -Math.abs(b.vx); beep(220, 0.03); }
      if (b.y - BALL_R <= 0) { b.y = BALL_R; b.vy = Math.abs(b.vy); beep(220, 0.03); }

      // Paddle collision
      if (b.vy > 0 && b.y + BALL_R >= pt && b.y + BALL_R <= pt + PADDLE_H + 4 &&
          b.x >= paddleX - 2 && b.x <= paddleX + paddleW + 2) {
        b.y = pt - BALL_R;
        if (stickyMode) {
          // Stick to paddle
          b.launched = false;
          b.stickyOffset = b.x - (paddleX + paddleW / 2);
          b.vx = 0; b.vy = 0;
          beep(440, 0.04);
          break;
        }
        const hit = (b.x - paddleX) / paddleW;
        const angle = -Math.PI * 0.15 - Math.PI * 0.7 * (1 - hit);
        const spd = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
        b.vx = Math.cos(angle) * spd;
        b.vy = Math.sin(angle) * spd;
        if (b.vy > 0) b.vy = -b.vy;
        beep(440, 0.04);
      }

      // Brick collision
      checkBrickCollision(b);

      // Ball lost
      if (b.y - BALL_R > CH) {
        lost = true;
        break;
      }
    }

    if (lost) {
      balls.splice(i, 1);
    }
  }

  // Check if all balls lost
  if (balls.length === 0) {
    livesVal--;
    beep(160, 0.2, 0.12);
    clearAllPowerEffects();
    paddleX = Math.max(0, Math.min(CW - paddleW, paddleX));
    updateUI();
    if (livesVal <= 0) {
      gameRunning = false;
      beep(100, 0.4, 0.15);
      showGameOver();
      return;
    }
    resetBallOnPaddle();
  }

  // Level cleared
  if (bricksRemaining() === 0) {
    scoreVal += 500 * levelVal; // level clear bonus

    // Show win screen after level 10 first time
    if (levelVal === 10 && !shownWinScreen) {
      shownWinScreen = true;
      gameRunning = false;
      beep(880, 0.2, 0.12);
      updateUI();
      showWinScreen();
      return;
    }

    levelVal++;
    ballSpeed = Math.min(5.5, 3 + (levelVal - 1) * 0.1);
    clearAllPowerEffects();
    paddleW = PADDLE_DEFAULT_W;
    paddleX = (CW - paddleW) / 2;
    loadLevel();
    resetBallOnPaddle();
    beep(880, 0.2, 0.12);
    updateUI();
  }

  updateUI();
}

// ── Load level ──
function loadLevel() {
  bricks = parseLevelLayout(levelVal - 1);
  brickRows = bricks.length;
}

// ── Draw ──
function drawBlock(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x + 1, y + 1, w - 2, h - 2);
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  ctx.fillRect(x + 2, y + 2, w - 6, 2);
  ctx.fillRect(x + 2, y + 2, 2, h - 6);
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.fillRect(x + 1, y + h - 3, w - 2, 2);
  ctx.fillRect(x + w - 3, y + 1, 2, h - 2);
}

function getSilverColor(hits) {
  if (hits >= 3) return '#cccccc';
  if (hits === 2) return '#999999';
  return '#666666';
}

function getRainbowColor(frame) {
  const hues = ['#ff3333','#ff6600','#ffff33','#33ff33','#33ffff','#6633ff','#ff33ff'];
  return hues[Math.floor(frame / 20) % hues.length];
}

function draw() {
  ctx.fillStyle = '#070707';
  ctx.fillRect(0, 0, CW, CH);

  // Bricks
  for (let r = 0; r < brickRows; r++) {
    for (let c = 0; c < BRICK_COLS; c++) {
      const v = bricks[r][c];
      if (v === B_EMPTY) continue;
      const bx = brickX(c), by = brickY(r);
      let color;
      if (v === B_GOLD) {
        color = '#ffaa00';
        drawBlock(bx, by, BRICK_W, BRICK_H, color);
        // Extra gold highlight
        ctx.fillStyle = 'rgba(255,255,255,0.2)';
        ctx.fillRect(bx + 3, by + 3, BRICK_W - 8, 2);
      } else if (v === B_RAINBOW) {
        color = getRainbowColor(rainbowFrame);
        drawBlock(bx, by, BRICK_W, BRICK_H, color);
      } else if (isSilver(v)) {
        color = getSilverColor(v);
        drawBlock(bx, by, BRICK_W, BRICK_H, color);
        // Metallic highlight
        ctx.fillStyle = 'rgba(255,255,255,0.18)';
        ctx.fillRect(bx + 3, by + 3, BRICK_W - 8, 2);
      } else {
        // Normal
        color = ROW_COLORS[r % ROW_COLORS.length];
        drawBlock(bx, by, BRICK_W, BRICK_H, color);
      }
    }
  }

  // Paddle
  const pt = pTop();
  let paddleColor = '#33ff33';
  if (laserMode) paddleColor = '#ff6600';
  else if (stickyMode) paddleColor = '#ffff33';
  drawBlock(paddleX, pt, paddleW, PADDLE_H, paddleColor);

  // Lasers
  ctx.fillStyle = '#ffaa00';
  ctx.shadowColor = 'rgba(255,170,0,0.5)';
  ctx.shadowBlur = 4;
  for (const l of lasers) {
    ctx.fillRect(l.x - 1, l.y, 2, 8);
  }
  ctx.shadowBlur = 0;

  // Balls
  for (const b of balls) {
    ctx.fillStyle = '#33ff33';
    ctx.shadowColor = 'rgba(51,255,51,0.5)';
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(b.x, b.y, BALL_R, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    // Trail
    if (b.launched) {
      ctx.fillStyle = 'rgba(51,255,51,0.15)';
      ctx.beginPath();
      ctx.arc(b.x - b.vx * 0.3, b.y - b.vy * 0.3, BALL_R * 0.7, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Powerup capsules
  for (const p of powerups) {
    const def = POWERUP_DEFS[p.type];
    ctx.fillStyle = def.color;
    ctx.shadowColor = def.color;
    ctx.shadowBlur = 6;
    ctx.fillRect(p.x - 10, p.y - 5, 20, 10);
    ctx.shadowBlur = 0;
    // Border
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1;
    ctx.strokeRect(p.x - 10, p.y - 5, 20, 10);
    // Letter
    ctx.fillStyle = '#000';
    ctx.font = '6px "Press Start 2P"';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(def.letter, p.x, p.y + 1);
  }

  // Active powerup indicator (on-canvas, top-right)
  if (activePower !== null) {
    const def = POWERUP_DEFS[activePower];
    const ix = CW - 16, iy = 6;
    ctx.fillStyle = def.color;
    ctx.shadowColor = def.color;
    ctx.shadowBlur = 4;
    ctx.fillRect(ix, iy, 10, 10);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#000';
    ctx.font = '5px "Press Start 2P"';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(def.letter, ix + 5, iy + 6);
    // Timer bar
    const maxDur = def.dur;
    const pct = Math.max(0, powerTimer / maxDur);
    ctx.fillStyle = def.color;
    ctx.fillRect(ix, iy + 12, Math.floor(10 * pct), 2);
  }
}

// ── UI ──
function updateUI() {
  document.getElementById('score').textContent = scoreVal;
  document.getElementById('level').textContent = levelVal;
  document.getElementById('lives').textContent = livesVal;
  if (scoreVal > hiScore) {
    hiScore = scoreVal;
    try { localStorage.setItem('arkanoid_hi', hiScore); } catch (e) {}
  }
  document.getElementById('hi').textContent = hiScore;
}

function showGameOver() {
  document.getElementById('finalScore').textContent = scoreVal;
  document.getElementById('finalLevel').textContent = levelVal;
  document.getElementById('finalBricks').textContent = totalBricksCleared;
  document.getElementById('gameOver').classList.remove('hidden');
  goSel = 0; updateGoSel();
}

function showWinScreen() {
  document.getElementById('winScore').textContent = scoreVal;
  document.getElementById('winLevel').textContent = levelVal;
  document.getElementById('winScreen').classList.remove('hidden');
  winSel = 0; updateWinSel();
}

// Game over menu
let goSel = 0;
function updateGoSel() { document.getElementById('goRetryBtn').classList.toggle('sel', goSel === 0); document.getElementById('goMenuBtn').classList.toggle('sel', goSel === 1); }
function goRetry() { document.getElementById('gameOver').classList.add('hidden'); startGame(); }
function goMenu() { window.location.href = 'index.html'; }

// Win screen menu
let winSel = 0;
function updateWinSel() { document.getElementById('winContinueBtn').classList.toggle('sel', winSel === 0); document.getElementById('winMenuBtn').classList.toggle('sel', winSel === 1); }
function winContinue() {
  document.getElementById('winScreen').classList.add('hidden');
  // Continue from level 11
  levelVal++;
  ballSpeed = Math.min(5.5, 3 + (levelVal - 1) * 0.1);
  clearAllPowerEffects();
  paddleW = PADDLE_DEFAULT_W;
  paddleX = (CW - paddleW) / 2;
  loadLevel();
  resetBallOnPaddle();
  gameRunning = true; paused = false; lastTime = 0;
  updateUI();
  requestAnimationFrame(gameLoop);
}

// ── Keyboard ──
const keysDown = {};
document.addEventListener('keydown', e => {
  // Confirm dialog open
  if (!document.getElementById('confirmBox').classList.contains('hidden')) {
    if (e.key === 'ArrowLeft' || e.key === 'y' || e.key === 'Y') { e.preventDefault(); confirmSel=0; updateConfirmSel(); }
    else if (e.key === 'ArrowRight' || e.key === 'n' || e.key === 'N') { e.preventDefault(); confirmSel=1; updateConfirmSel(); }
    else if (e.key === 'Enter') { e.preventDefault(); if (confirmSel===0) window.location.href='index.html'; else hideConfirm(); }
    else if (e.key === 'Escape') { e.preventDefault(); hideConfirm(); }
    return;
  }
  // Pause menu navigation
  if (paused) {
    if (e.key === 'ArrowDown' || e.key === 'ArrowUp') { e.preventDefault(); pauseSel = pauseSel===0 ? 1 : 0; updatePauseSel(); return; }
    if (e.key === 'Enter') { e.preventDefault(); if (pauseSel===1) showConfirm(); else togglePause(); return; }
    if (e.key === 'Escape' || e.key === 'p' || e.key === 'P') { e.preventDefault(); togglePause(); return; }
    return;
  }
  if (e.key === 'p' || e.key === 'P' || e.key === 'Escape') { e.preventDefault(); togglePause(); return; }
  // Game over menu navigation
  if (!document.getElementById('gameOver').classList.contains('hidden')) {
    if (e.key === 'ArrowDown' || e.key === 'ArrowUp') { e.preventDefault(); goSel = goSel === 0 ? 1 : 0; updateGoSel(); }
    else if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); if (goSel === 1) goMenu(); else goRetry(); }
    return;
  }
  // Win screen menu navigation
  if (!document.getElementById('winScreen').classList.contains('hidden')) {
    if (e.key === 'ArrowDown' || e.key === 'ArrowUp') { e.preventDefault(); winSel = winSel === 0 ? 1 : 0; updateWinSel(); }
    else if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); if (winSel === 1) goMenu(); else winContinue(); }
    return;
  }
  if (!gameRunning || paused) return;
  keysDown[e.key] = true;
  if (e.key === 'ArrowUp' || e.key === ' ') { e.preventDefault(); tapAction(); }
  if (e.key === 'ArrowLeft') e.preventDefault();
  if (e.key === 'ArrowRight') e.preventDefault();
  if (e.key === 'ArrowDown') e.preventDefault();
});
document.addEventListener('keyup', e => { keysDown[e.key] = false; });

function handleKeyboardInput() {
  if (keysDown['ArrowLeft']) paddleX = Math.max(0, paddleX - 4);
  if (keysDown['ArrowRight']) paddleX = Math.min(CW - paddleW, paddleX + 4);
}

// ── Touch ──
const bw = document.getElementById('boardWrap');
let tx, ty, tt, moved, lastMX;

bw.addEventListener('touchstart', e => {
  if (!gameRunning || paused || e.target.id === 'pauseBtn') return;
  e.preventDefault();
  const t = e.touches[0];
  tx = t.clientX; ty = t.clientY; tt = Date.now();
  moved = false; lastMX = tx;
}, { passive: false });

bw.addEventListener('touchmove', e => {
  if (!gameRunning || paused) return;
  e.preventDefault();
  const t = e.touches[0];
  const dx = t.clientX - lastMX;
  const scale = CW / canvas.offsetWidth;
  paddleX = Math.max(0, Math.min(CW - paddleW, paddleX + dx * scale));
  lastMX = t.clientX;
  if (Math.abs(t.clientX - tx) > 8) moved = true;
}, { passive: false });

bw.addEventListener('touchend', e => {
  if (!gameRunning || paused) return;
  e.preventDefault();
  const el = Date.now() - tt;
  const ct = e.changedTouches[0];
  const fdx = ct.clientX - tx;
  if (!moved && el < 250 && Math.abs(fdx) < 12 && Math.abs(ct.clientY - ty) < 12) {
    tapAction();
  }
}, { passive: false });

// ── Pause ──
const pauseOv = document.getElementById('pauseOverlay');
let pauseSel = 0;
function updatePauseSel() { document.getElementById('resumeBtn').classList.toggle('sel', pauseSel === 0); document.getElementById('menuBtn').classList.toggle('sel', pauseSel === 1); }
function togglePause() {
  if (!gameRunning) return;
  paused = !paused;
  pauseOv.classList.toggle('hidden', !paused);
  if (!paused) { lastTime = 0; requestAnimationFrame(gameLoop); }
  else { pauseSel = 0; updatePauseSel(); }
}
document.getElementById('pauseBtn').addEventListener('click', e => { e.stopPropagation(); togglePause(); });
document.getElementById('pauseBtn').addEventListener('touchend', e => { e.stopPropagation(); e.preventDefault(); togglePause(); });
pauseOv.addEventListener('click', e => { if (!['resumeBtn','menuBtn','confirmYes','confirmNo'].includes(e.target.id) && !e.target.closest('#confirmBox')) togglePause(); });
pauseOv.addEventListener('touchend', e => { if (!['resumeBtn','menuBtn','confirmYes','confirmNo'].includes(e.target.id) && !e.target.closest('#confirmBox')) { e.preventDefault(); togglePause(); } });
['click', 'touchend'].forEach(ev => document.getElementById('resumeBtn').addEventListener(ev, e => { e.stopPropagation(); e.preventDefault(); togglePause(); }));
// Confirm exit
let confirmSel=0;
function showConfirm(){
  document.getElementById('confirmBox').classList.remove('hidden');
  confirmSel=0;updateConfirmSel();
}
function hideConfirm(){document.getElementById('confirmBox').classList.add('hidden');}
function updateConfirmSel(){
  document.getElementById('confirmYes').classList.toggle('sel',confirmSel===0);
  document.getElementById('confirmNo').classList.toggle('sel',confirmSel===1);
}
['click', 'touchend'].forEach(ev => document.getElementById('menuBtn').addEventListener(ev, e => { e.stopPropagation(); e.preventDefault(); showConfirm(); }));
['click', 'touchend'].forEach(ev => document.getElementById('confirmYes').addEventListener(ev, e => { e.stopPropagation(); e.preventDefault(); window.location.href = 'index.html'; }));
['click', 'touchend'].forEach(ev => document.getElementById('confirmNo').addEventListener(ev, e => { e.stopPropagation(); e.preventDefault(); hideConfirm(); }));

// ── Game loop ──
function gameLoop(time) {
  if (!gameRunning) { draw(); return; }
  if (paused) return;
  const dt = time - (lastTime || time);
  lastTime = time;
  handleKeyboardInput();
  if (dt < 100) update(dt);
  draw();
  requestAnimationFrame(gameLoop);
}

// ── Start ──
function startGame() {
  scoreVal = 0; levelVal = 1; livesVal = 3;
  totalBricksCleared = 0;
  ballSpeed = 3;
  paddleW = PADDLE_DEFAULT_W;
  paddleX = (CW - paddleW) / 2;
  balls = []; powerups = []; lasers = [];
  activePower = null; powerTimer = 0;
  laserMode = false; stickyMode = false; slowMode = false;
  rainbowFrame = 0;
  shownWinScreen = false;
  loadLevel();
  resetBallOnPaddle();
  gameRunning = true; paused = false; lastTime = 0; lastDt = 16;
  try { hiScore = parseInt(localStorage.getItem('arkanoid_hi')) || 0; } catch (e) { hiScore = 0; }
  updateUI();
  updateTouchHint();
  draw();
  requestAnimationFrame(gameLoop);
}

['click', 'touchend'].forEach(ev => {
  document.getElementById('startScreen').addEventListener(ev, e => {
    e.preventDefault(); document.getElementById('startScreen').classList.add('hidden'); startGame();
  });
  document.getElementById('goRetryBtn').addEventListener(ev, e => { e.stopPropagation(); e.preventDefault(); goRetry(); });
  document.getElementById('goMenuBtn').addEventListener(ev, e => { e.stopPropagation(); e.preventDefault(); goMenu(); });
  document.getElementById('winContinueBtn').addEventListener(ev, e => { e.stopPropagation(); e.preventDefault(); winContinue(); });
  document.getElementById('winMenuBtn').addEventListener(ev, e => { e.stopPropagation(); e.preventDefault(); goMenu(); });
});
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ' ') {
    const start = document.getElementById('startScreen');
    if (!start.classList.contains('hidden')) { e.preventDefault(); start.classList.add('hidden'); startGame(); }
  }
});

// ── Resize ──
function resize() {
  const wrap = document.getElementById('boardWrap');
  const aH = wrap.clientHeight - 8, aW = wrap.clientWidth - 8;
  const ASPECT = CH / CW;
  let w = aW, h = w * ASPECT;
  if (h > aH) { h = aH; w = h / ASPECT; }
  canvas.style.width = Math.floor(w) + 'px';
  canvas.style.height = Math.floor(h) + 'px';
}
window.addEventListener('resize', resize);
setTimeout(resize, 50); setTimeout(resize, 200); resize();
document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
ctx.fillStyle = '#070707'; ctx.fillRect(0, 0, CW, CH);
