<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RETRO ARCADE">
<title>RETRO ARCADE</title>
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--g:#33ff33;--gd:#1a8c1a;--bg:#070707;--glow:rgba(51,255,51,0.12);--amber:#ffaa00}
html,body{
  height:100%;height:100dvh;overflow:hidden;background:#000;touch-action:none;
  -webkit-user-select:none;user-select:none;-webkit-touch-callout:none;
  -webkit-tap-highlight-color:transparent;
}
body{
  display:flex;flex-direction:column;
  font-family:'Press Start 2P',monospace;
  background:radial-gradient(ellipse at center,#0d0d0d 0%,#000 80%);color:var(--g);
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}
.crt::before{
  content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px);
  pointer-events:none;z-index:1000;
}
.crt::after{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,0.65) 100%);
  pointer-events:none;z-index:1001;
}
@keyframes titleGlow{
  0%,100%{text-shadow:0 0 2px #fff,0 0 8px var(--g),0 0 20px rgba(51,255,51,0.25)}
  50%{text-shadow:0 0 4px #fff,0 0 12px var(--g),0 0 30px rgba(51,255,51,0.35)}
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

.header{
  flex-shrink:0;
  display:flex;flex-direction:column;align-items:center;
  padding:20px 16px 12px;
  border-bottom:1px solid var(--gd);
}
.arcade-title{
  font-size:18px;letter-spacing:5px;
  animation:titleGlow 3s ease-in-out infinite;
  text-align:center;line-height:1.4;
}
.arcade-subtitle{
  font-size:5px;letter-spacing:3px;opacity:0.4;margin-top:8px;
}

.game-list{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:8px 0;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.game-list::-webkit-scrollbar{display:none}

.game-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;
  cursor:pointer;
  border-bottom:1px solid rgba(26,140,26,0.2);
  transition:background 0.1s;
  -webkit-tap-highlight-color:transparent;
  position:relative;
}
.game-item:active,
.game-item.selected{
  background:rgba(51,255,51,0.06);
}
.game-item-left{
  display:flex;align-items:center;gap:12px;
}
.game-arrow{
  font-size:8px;color:var(--gd);
  transition:color 0.1s,text-shadow 0.1s;
}
.game-item:active .game-arrow,
.game-item.selected .game-arrow{
  color:var(--amber);
  text-shadow:0 0 6px var(--amber);
}
.game-name{
  font-size:11px;letter-spacing:2px;
  transition:color 0.1s,text-shadow 0.1s;
  display:inline-flex;align-items:center;
}
.game-item:active .game-name,
.game-item.selected .game-name{
  color:#d0ffd0;
  text-shadow:0 0 2px #fff,0 0 8px var(--g);
}
.game-score{
  font-size:9px;color:var(--amber);
  text-shadow:0 0 4px var(--amber);
  min-width:60px;text-align:right;
}
.game-score.no-score{
  color:var(--gd);
  text-shadow:none;
  opacity:0.5;
}
.game-beta{
  font-size:7px;letter-spacing:1px;color:#ffaa00;
  border:1px solid #ffaa00;padding:2px 6px;
  opacity:0.9;margin-left:8px;
  text-shadow:0 0 4px #ffaa00;
}

.footer{
  flex-shrink:0;
  text-align:center;
  padding:8px 0 12px;
  font-size:5px;letter-spacing:2px;opacity:0.3;
  text-shadow:0 0 3px var(--g);
  border-top:1px solid rgba(26,140,26,0.2);
}
</style>
</head>
<body class="crt">

<div class="header">
  <div class="arcade-title">RETRO<br>ARCADE</div>
  <div class="arcade-subtitle">SELECT GAME</div>
</div>

<div class="game-list" id="gameList"></div>

<div class="footer">TAP TO PLAY</div>

<script>
const GAMES = [
  { name: 'TETRIS',         file: 'tetris.html',   key: 'tetris_hi'   },
  { name: 'SPACE INVADERS', file: 'invaders.html', key: 'invaders_hi' },
  { name: 'ARKANOID',       file: 'arkanoid.html', key: 'arkanoid_hi', beta: true },
  { name: '2048',           file: '2048.html',     key: '2048_hi'     },
  { name: 'ASTEROIDS',     file: 'asteroids.html',key: 'asteroids_hi'},
  { name: 'PONG',          file: 'pong.html',     key: 'pong_hi'     },
  { name: 'FLAPPY',        file: 'flappy.html',   key: 'flappy_hi'   },
];

function getHi(key) {
  try { return localStorage.getItem(key); } catch(e) { return null; }
}

function render() {
  const list = document.getElementById('gameList');
  list.innerHTML = '';
  GAMES.forEach(game => {
    const hi = getHi(game.key);
    const item = document.createElement('div');
    item.className = 'game-item';
    item.innerHTML =
      '<div class="game-item-left">' +
        '<span class="game-arrow">&#9658;</span>' +
        '<span class="game-name">' + game.name + (game.beta ? '<span class="game-beta">BETA</span>' : '') + '</span>' +
      '</div>' +
      '<span class="game-score' + (hi ? '' : ' no-score') + '">' +
        (hi ? hi : '---') +
      '</span>';

    ['click', 'touchend'].forEach(ev => {
      item.addEventListener(ev, e => {
        e.preventDefault();
        window.location.href = game.file;
      });
    });

    list.appendChild(item);
  });
}

// Keyboard navigation
let selectedIdx = -1;
document.addEventListener('keydown', e => {
  const items = document.querySelectorAll('.game-item');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (selectedIdx < items.length - 1) selectedIdx++;
    else selectedIdx = 0;
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (selectedIdx > 0) selectedIdx--;
    else selectedIdx = items.length - 1;
  } else if ((e.key === 'Enter' || e.key === ' ') && selectedIdx >= 0) {
    e.preventDefault();
    window.location.href = GAMES[selectedIdx].file;
    return;
  } else {
    return;
  }
  items.forEach((el, i) => el.classList.toggle('selected', i === selectedIdx));
  items[selectedIdx].scrollIntoView({ block: 'nearest' });
});

document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

render();
</script>
</body>
</html>
