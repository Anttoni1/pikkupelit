<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FLAPPY">
<title>FLAPPY</title>
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--g:#33ff33;--gd:#1a8c1a;--bg:#070707;--glow:rgba(51,255,51,0.12);--amber:#ffaa00}
html,body{
  height:100%;height:100dvh;overflow:hidden;background:#000;touch-action:none;
  -webkit-user-select:none;user-select:none;-webkit-touch-callout:none;
  -webkit-tap-highlight-color:transparent;
}
body{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:'Press Start 2P',monospace;
  background:radial-gradient(ellipse at center,#0d0d0d 0%,#000 80%);color:var(--g);
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}
.crt::before{
  content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px);
  pointer-events:none;z-index:1000;
}
.crt::after{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,0.65) 100%);
  pointer-events:none;z-index:1001;
}
@keyframes titleGlow{
  0%,100%{text-shadow:0 0 2px #fff,0 0 8px var(--g),0 0 20px rgba(51,255,51,0.25)}
  50%{text-shadow:0 0 4px #fff,0 0 12px var(--g),0 0 30px rgba(51,255,51,0.35)}
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

.game-container{
  display:flex;flex-direction:column;align-items:center;
  width:100%;height:auto;position:relative;
}
.topbar{
  display:flex;justify-content:space-between;align-items:center;
  width:100%;padding:6px 12px;flex-shrink:0;z-index:10;
}
.topbar-left{display:flex;flex-direction:column;gap:2px}
.title{font-size:14px;letter-spacing:4px;animation:titleGlow 3s ease-in-out infinite}
.score-text{font-size:7px;text-shadow:0 0 4px var(--g);line-height:1.8}
.score-text span{color:var(--amber);text-shadow:0 0 4px var(--amber)}
.topbar-right{display:flex;align-items:center;gap:8px}
.stat-box{text-align:center}
.stat-lbl{font-size:5px;letter-spacing:1px;opacity:0.6;text-shadow:0 0 3px var(--g)}
.stat-val{font-size:9px;color:var(--amber);text-shadow:0 0 5px var(--amber)}

.board-wrap{
  flex:1;display:flex;align-items:flex-start;justify-content:center;
  width:100%;position:relative;padding:0;
}
canvas#board{
  border:2px solid var(--gd);
  box-shadow:0 0 15px var(--glow),inset 0 0 25px rgba(0,0,0,0.4);
  image-rendering:pixelated;border-radius:2px;
}
.touch-hint{
  font-size:5px;letter-spacing:1px;opacity:0.3;text-align:center;
  padding:4px 0 8px 0;flex-shrink:0;text-shadow:0 0 3px var(--g);
}
.pause-btn{
  font-family:'Press Start 2P',monospace;font-size:9px;color:var(--gd);
  background:none;border:1px solid var(--gd);padding:8px 12px;border-radius:3px;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
}
.pause-btn:active{color:var(--g);border-color:var(--g)}

.overlay{
  position:fixed;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:rgba(0,0,0,0.88);z-index:500;gap:16px;text-align:center;
}
.overlay h1{font-size:22px;letter-spacing:5px;animation:titleGlow 2s ease-in-out infinite;color:#d0ffd0}
.overlay h2{font-size:13px;color:var(--amber);text-shadow:0 0 8px var(--amber)}
.overlay .sub{font-size:7px;line-height:2.4;opacity:0.7}
.overlay .start-hint{font-size:8px;animation:blink 1.2s step-end infinite;margin-top:12px}
.overlay .final-score{font-size:9px;line-height:2.4}
.overlay .final-score span{color:var(--amber);text-shadow:0 0 6px var(--amber)}
.hidden{display:none !important}
.pause-overlay{
  position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(0,0,0,0.85);z-index:400;gap:24px;
}
.pause-overlay .pause-text{font-size:14px;letter-spacing:4px;animation:blink 1.5s step-end infinite}
.pause-menu-btn{
  font-family:'Press Start 2P',monospace;font-size:8px;color:var(--gd);
  background:none;border:1px solid var(--gd);padding:10px 16px;border-radius:3px;
  cursor:pointer;-webkit-tap-highlight-color:transparent;letter-spacing:2px;
}
.pause-menu-btn:active{color:var(--g);border-color:var(--g)}
.pause-menu-btn.sel{color:var(--amber);border-color:var(--amber);text-shadow:0 0 6px var(--amber)}
.confirm-box{display:flex;flex-direction:column;align-items:center;gap:16px;padding:24px;border:1px solid var(--gd);background:rgba(7,7,7,0.95)}
.confirm-q{font-size:8px;letter-spacing:2px;line-height:2}
.confirm-btns{display:flex;gap:16px}
.confirm-yes,.confirm-no{font-family:'Press Start 2P',monospace;font-size:8px;padding:10px 18px;border-radius:3px;cursor:pointer;-webkit-tap-highlight-color:transparent;letter-spacing:2px;background:none}
.confirm-yes{color:var(--amber);border:1px solid var(--amber)}
.confirm-no{color:var(--gd);border:1px solid var(--gd)}
.confirm-yes.sel,.confirm-yes:active{background:rgba(255,170,0,0.15);color:#fff;border-color:#fff}
.confirm-no.sel,.confirm-no:active{background:rgba(51,255,51,0.1);color:var(--g);border-color:var(--g)}
</style>
</head>
<body class="crt">

<!-- Start screen -->
<div class="overlay" id="startScreen">
  <h1>FLAPPY</h1>
  <div class="sub">TAP OR SPACE = FLAP<br>AVOID THE PIPES<br>SURVIVE AS LONG AS YOU CAN!</div>
  <div class="start-hint">TAP TO START</div>
</div>

<!-- Game over -->
<div class="overlay hidden" id="gameOver">
  <h2>GAME OVER</h2>
  <div class="final-score">SCORE <span id="finalScore">0</span><br>LEVEL <span id="finalLevel">1</span><br>BEST <span id="finalHi">0</span></div>
  <button class="pause-menu-btn sel" id="goRetryBtn">RETRY</button>
  <button class="pause-menu-btn" id="goMenuBtn">EXIT TO MENU</button>
</div>

<!-- Game -->
<div class="game-container" id="gameUI">
  <div class="topbar">
    <div class="topbar-left">
      <div class="title">FLAPPY</div>
      <div class="score-text">SCORE <span id="score">0</span> &nbsp;HI <span id="hi">0</span></div>
    </div>
    <button class="pause-btn" id="pauseBtn">PAUSE</button>
    <div class="topbar-right">
      <div class="stat-box"><div class="stat-lbl">LEVEL</div><div class="stat-val" id="level">1</div></div>
      <div class="stat-box"><div class="stat-lbl">BEST</div><div class="stat-val" id="best">0</div></div>
    </div>
  </div>
  <div class="board-wrap" id="boardWrap">
    <canvas id="board" width="240" height="400"></canvas>
  </div>
  <div class="touch-hint">TAP TO FLAP &nbsp; SPACE / ↑ ON KEYBOARD</div>
</div>

<!-- Pause overlay -->
<div class="pause-overlay hidden" id="pauseOverlay">
  <div class="pause-text">PAUSE</div>
  <button class="pause-menu-btn" id="resumeBtn">RESUME</button>
  <button class="pause-menu-btn" id="menuBtn">EXIT TO MENU</button>
  <div class="confirm-box hidden" id="confirmBox">
    <div class="confirm-q">EXIT TO MENU?</div>
    <div class="confirm-btns">
      <button class="confirm-yes sel" id="confirmYes">YES</button>
      <button class="confirm-no" id="confirmNo">NO</button>
    </div>
  </div>
</div>

<script>
// ── ERA system ─────────────────────────────────────────────────────────────────
const ERA = localStorage.getItem('arcade_era') || '90s';
(function applyEra() {
  const vars = ERA === '90s'
    ? {'--g':'#ffffff','--gd':'#aaaacc','--bg':'#6699ff','--glow':'rgba(255,255,255,0.1)','--amber':'#ffdd00'}
    : {'--g':'#33ff33','--gd':'#1a8c1a','--bg':'#070707','--glow':'rgba(51,255,51,0.12)','--amber':'#ffaa00'};
  Object.entries(vars).forEach(([k,v]) => document.documentElement.style.setProperty(k,v));
  if (ERA === '90s') {
    const s = document.createElement('style');
    s.textContent = `.crt::before{background:repeating-linear-gradient(0deg,transparent,transparent 4px,rgba(0,0,0,0.05) 4px,rgba(0,0,0,0.05) 6px)!important}.crt::after{background:radial-gradient(ellipse at center,transparent 60%,rgba(0,0,0,0.4) 100%)!important}body{background:radial-gradient(ellipse at center,#000828 0%,#000010 80%)!important}@keyframes titleGlow{0%,100%{text-shadow:0 0 2px #fff,0 0 8px var(--g),0 0 20px var(--glow)}50%{text-shadow:0 0 4px #fff,0 0 14px var(--g),0 0 30px var(--glow)}}.overlay h1{color:#ffffff!important}.confirm-no.sel,.confirm-no:active{background:rgba(255,255,255,0.1)!important;border-color:var(--g)!important;color:var(--g)!important}`;
    document.head.appendChild(s);
  }
})();

// ── Seeded PRNG ────────────────────────────────────────────────────────────────
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
let rand;

// ── Constants ──────────────────────────────────────────────────────────────────
const CANVAS_W = 240, CANVAS_H = 400;
const BIRD_X = 60;
const BIRD_W = 16, BIRD_H = 12;
const GRAVITY = 0.0005;    // px/ms²
const FLAP_VEL = -0.23;    // px/ms upward
const PIPE_W = 32;
const PIPE_GAP = 100;      // vertical gap between top and bottom pipe
const BASE_PIPE_SPEED = 0.07;   // px/ms at level 1
const PIPE_SPACING = 140;  // horizontal distance between pipes
const GROUND_H = 20;

// Level thresholds: reach this score to advance
const LEVELS = [
  { score: 0,  speed: 1.0 },  // level 1
  { score: 5,  speed: 1.1 },  // level 2
  { score: 10, speed: 1.2 },  // level 3
  { score: 20, speed: 1.35 }, // level 4
  { score: 30, speed: 1.5 },  // level 5
  { score: 45, speed: 1.65 }, // level 6
  { score: 60, speed: 1.8 },  // level 7
];

// ── State ──────────────────────────────────────────────────────────────────────
let scoreVal, hiScore, gameRunning, paused, lastTime;
let birdY, birdVel, birdAngle;
let pipes; // [{x, topH}] — topH = height of top pipe, gap starts at topH
let pipeTimer; // distance traveled since last pipe spawn
let deadTimer; // ms after death before game over screen
let levelVal, curSpeed, curGap;

// ── Canvas ─────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');

// ── Audio ──────────────────────────────────────────────────────────────────────
let audioCtx;
function beep(freq, duration, volume = 0.08) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = ERA === '90s' ? 'sawtooth' : 'square';
    o.frequency.value = freq; g.gain.value = volume;
    o.connect(g); g.connect(audioCtx.destination);
    o.start();
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    o.stop(audioCtx.currentTime + duration);
  } catch(e) {}
}

// ── Game logic ─────────────────────────────────────────────────────────────────
function updateLevel() {
  let newLevel = 1;
  for (let i = LEVELS.length - 1; i >= 0; i--) {
    if (scoreVal >= LEVELS[i].score) { newLevel = i + 1; break; }
  }
  if (newLevel !== levelVal) {
    levelVal = newLevel;
    const cfg = LEVELS[levelVal - 1];
    curSpeed = BASE_PIPE_SPEED * cfg.speed;
    document.getElementById('level').textContent = levelVal;
    if (scoreVal > 0) beep(880, 0.15, 0.1); // level up sound
  }
}

function spawnPipe() {
  const minTop = 40;
  const maxTop = CANVAS_H - GROUND_H - curGap - 40;
  const topH = minTop + rand() * (maxTop - minTop);
  pipes.push({ x: CANVAS_W + 10, topH, gap: curGap, scored: false });
}

function flap() {
  if (!gameRunning || paused) return;
  if (deadTimer > 0) return;
  birdVel = FLAP_VEL;
  beep(440, 0.06);
}

function checkCollision() {
  const bx = BIRD_X, by = birdY;
  // Ground or ceiling
  if (by + BIRD_H > CANVAS_H - GROUND_H || by < 0) return true;
  // Pipes
  for (const p of pipes) {
    if (bx + BIRD_W > p.x && bx < p.x + PIPE_W) {
      const g = p.gap || curGap;
      if (by < p.topH || by + BIRD_H > p.topH + g) return true;
    }
  }
  return false;
}

function die() {
  gameRunning = false;
  deadTimer = 1;
  beep(100, 0.4);
  if (scoreVal > hiScore) {
    hiScore = scoreVal;
    try { localStorage.setItem('flappy_hi', hiScore); } catch(e) {}
  }
  showGameOver();
}

// ── Drawing ────────────────────────────────────────────────────────────────────
function drawBird() {
  ctx.save();
  ctx.translate(BIRD_X + BIRD_W/2, birdY + BIRD_H/2);
  const angle = Math.max(-0.4, Math.min(0.6, birdVel * 3));
  ctx.rotate(angle);

  if (ERA === '90s') {
    // Pixel bird: yellow body, orange beak, white belly, dark eye, wing
    // Body (golden yellow)
    ctx.fillStyle = '#ffcc00';
    ctx.fillRect(-BIRD_W/2 + 1, -BIRD_H/2 + 1, BIRD_W - 5, BIRD_H - 2);
    // Belly highlight (lighter yellow / cream)
    ctx.fillStyle = '#ffee88';
    ctx.fillRect(-BIRD_W/2 + 2, -BIRD_H/2 + 4, 4, 4);
    // Wing (darker amber)
    ctx.fillStyle = '#dd8800';
    ctx.fillRect(-BIRD_W/2 + 2, -BIRD_H/2 + 2, 5, 3);
    // Wing highlight edge
    ctx.fillStyle = '#ffdd44';
    ctx.fillRect(-BIRD_W/2 + 2, -BIRD_H/2 + 2, 5, 1);
    // Tail feathers (dark amber, left side)
    ctx.fillStyle = '#bb6600';
    ctx.fillRect(-BIRD_W/2, -BIRD_H/2 + 3, 2, 5);
    ctx.fillRect(-BIRD_W/2 + 1, -BIRD_H/2 + 2, 1, 1);
    ctx.fillRect(-BIRD_W/2 + 1, -BIRD_H/2 + 8, 1, 2);
    // Eye (dark)
    ctx.fillStyle = '#111111';
    ctx.fillRect(BIRD_W/2 - 6, -BIRD_H/2 + 2, 3, 3);
    // Eye shine
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(BIRD_W/2 - 5, -BIRD_H/2 + 2, 1, 1);
    // Beak — orange, protrudes right
    ctx.fillStyle = '#ff7700';
    ctx.fillRect(BIRD_W/2 - 4, -BIRD_H/2 + 3, 5, 3);
    ctx.fillRect(BIRD_W/2 - 4, -BIRD_H/2 + 4, 5, 1); // lower jaw slightly shorter
    ctx.fillStyle = '#ffaa44';
    ctx.fillRect(BIRD_W/2 - 4, -BIRD_H/2 + 3, 5, 1); // top beak highlight
  } else {
    // 80s green phosphor bird
    ctx.fillStyle = '#33ff33';
    ctx.fillRect(-BIRD_W/2 + 1, -BIRD_H/2 + 1, BIRD_W - 2, BIRD_H - 2);
    ctx.fillStyle = '#66ff66';
    ctx.fillRect(-BIRD_W/2 + 1, -BIRD_H/2 + 1, BIRD_W - 2, 2);
    ctx.fillRect(-BIRD_W/2 + 1, -BIRD_H/2 + 1, 2, BIRD_H - 2);
    ctx.fillStyle = '#1a8c1a';
    ctx.fillRect(-BIRD_W/2 + 1, BIRD_H/2 - 3, BIRD_W - 2, 2);
    ctx.fillRect(BIRD_W/2 - 3, -BIRD_H/2 + 1, 2, BIRD_H - 2);
    // Eye
    ctx.fillStyle = '#070707';
    ctx.fillRect(BIRD_W/2 - 6, -BIRD_H/2 + 2, 3, 3);
    // Beak — protrudes right of body
    ctx.fillStyle = '#ffaa00';
    ctx.fillRect(BIRD_W/2 - 1, -1, 5, 3);
  }

  ctx.restore();
}

function drawPipe(p) {
  const g = p.gap || curGap;
  const botY = p.topH + g;
  const botH = CANVAS_H - GROUND_H - botY;

  if (ERA === '90s') {
    // SMB-style bright green pipes with hard pixel edges
    const PC = '#00aa00', PH = '#00dd00', PS = '#006600', PCap = '#00bb00';
    // Top pipe body
    ctx.fillStyle = PC; ctx.fillRect(p.x, 0, PIPE_W, p.topH);
    ctx.fillStyle = PH; ctx.fillRect(p.x + 1, 0, 3, p.topH);
    ctx.fillStyle = PS; ctx.fillRect(p.x + PIPE_W - 4, 0, 3, p.topH);
    // Top cap (wider, hard edges)
    ctx.fillStyle = PCap; ctx.fillRect(p.x - 4, p.topH - 10, PIPE_W + 8, 10);
    ctx.fillStyle = PH; ctx.fillRect(p.x - 4, p.topH - 10, PIPE_W + 8, 2);
    ctx.fillStyle = PS; ctx.fillRect(p.x - 4, p.topH - 2, PIPE_W + 8, 2);

    // Bottom pipe body
    ctx.fillStyle = PC; ctx.fillRect(p.x, botY, PIPE_W, botH);
    ctx.fillStyle = PH; ctx.fillRect(p.x + 1, botY, 3, botH);
    ctx.fillStyle = PS; ctx.fillRect(p.x + PIPE_W - 4, botY, 3, botH);
    // Bottom cap
    ctx.fillStyle = PCap; ctx.fillRect(p.x - 4, botY, PIPE_W + 8, 10);
    ctx.fillStyle = PH; ctx.fillRect(p.x - 4, botY, PIPE_W + 8, 2);
    ctx.fillStyle = PS; ctx.fillRect(p.x - 4, botY + 8, PIPE_W + 8, 2);
  } else {
    // 80s green phosphor pipes
    ctx.fillStyle = '#1a8c1a'; ctx.fillRect(p.x, 0, PIPE_W, p.topH);
    ctx.fillStyle = '#33dd33'; ctx.fillRect(p.x + 1, 0, 2, p.topH);
    ctx.fillStyle = '#22cc22'; ctx.fillRect(p.x - 3, p.topH - 8, PIPE_W + 6, 8);
    ctx.fillStyle = '#33ff33'; ctx.fillRect(p.x - 3, p.topH - 8, PIPE_W + 6, 2);

    ctx.fillStyle = '#1a8c1a'; ctx.fillRect(p.x, botY, PIPE_W, botH);
    ctx.fillStyle = '#33dd33'; ctx.fillRect(p.x + 1, botY, 2, botH);
    ctx.fillStyle = '#22cc22'; ctx.fillRect(p.x - 3, botY, PIPE_W + 6, 8);
    ctx.fillStyle = '#33ff33'; ctx.fillRect(p.x - 3, botY, PIPE_W + 6, 2);
  }
}

function drawGround() {
  const gy = CANVAS_H - GROUND_H;
  ctx.fillStyle = '#1a8c1a';
  ctx.fillRect(0, gy, CANVAS_W, GROUND_H);
  ctx.fillStyle = '#33ff33';
  ctx.fillRect(0, gy, CANVAS_W, 2);
  // Ground pattern
  ctx.fillStyle = '#0d5c0d';
  for (let x = 0; x < CANVAS_W; x += 12) {
    ctx.fillRect(x, gy + 6, 6, 2);
    ctx.fillRect(x + 6, gy + 12, 6, 2);
  }
}

// Cloud positions (stable, generated once)
const CLOUDS = [{x:20,y:30,w:50},{x:110,y:18,w:40},{x:165,y:50,w:55},{x:60,y:55,w:36}];

function drawBackground() {
  if (ERA === '90s') {
    // Sky gradient
    const sky = ctx.createLinearGradient(0, 0, 0, CANVAS_H - GROUND_H);
    sky.addColorStop(0, '#5588ee');
    sky.addColorStop(1, '#99ccff');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H - GROUND_H);

    // VGA-style pixel clouds with layered shading
    for (const c of CLOUDS) {
      const x = c.x, y = c.y, w = c.w;
      // 1) Drop shadow — light blue, 1px down+right offset
      ctx.fillStyle = '#aabbdd';
      ctx.fillRect(x + 1, y + 1, w, 8);
      ctx.fillRect(x + 7, y - 5, w - 12, 8);
      ctx.fillRect(x + 13, y - 9, w - 24, 6);
      // 2) Main body — white
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(x, y, w, 8);
      ctx.fillRect(x + 6, y - 6, w - 12, 8);
      ctx.fillRect(x + 12, y - 10, w - 24, 6);
      // 3) Pure white highlight on topmost peak
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(x + 14, y - 10, w - 28, 2);
      // 4) Light grey bottom strip — puffy rounded underside
      ctx.fillStyle = '#ccddee';
      ctx.fillRect(x + 2, y + 5, w - 4, 3);
      // 5) Darker right-side shade on main bump
      ctx.fillStyle = '#bbccdd';
      ctx.fillRect(x + w - 8, y, 5, 7);
      // 6) Inner shadow on mid-level bump right edge
      ctx.fillStyle = '#bbccdd';
      ctx.fillRect(x + w - 14, y - 5, 3, 6);
    }
  } else {
    ctx.fillStyle = '#070707';
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  }
}

function drawGround90s() {
  const gy = CANVAS_H - GROUND_H;
  // Ground base — green platform look
  ctx.fillStyle = '#228b22';
  ctx.fillRect(0, gy, CANVAS_W, GROUND_H);
  // Top bright stripe
  ctx.fillStyle = '#44cc44';
  ctx.fillRect(0, gy, CANVAS_W, 4);
  // Dark bottom
  ctx.fillStyle = '#8b5a00';
  ctx.fillRect(0, gy + 8, CANVAS_W, GROUND_H - 8);
  // Brick pattern
  ctx.fillStyle = '#6b3e00';
  for (let bx = 0; bx < CANVAS_W; bx += 16) {
    ctx.fillRect(bx, gy + 8, 1, GROUND_H - 8);
    ctx.fillRect(bx + 8, gy + 14, 1, GROUND_H - 14);
  }
  ctx.fillRect(0, gy + 14, CANVAS_W, 1);
}

function draw() {
  drawBackground();

  // Pipes
  for (const p of pipes) drawPipe(p);

  // Ground
  if (ERA === '90s') drawGround90s(); else drawGround();

  // Bird
  drawBird();
}

// ── UI ─────────────────────────────────────────────────────────────────────────
function updateUI() {
  document.getElementById('score').textContent = scoreVal;
  if (scoreVal > hiScore) {
    hiScore = scoreVal;
    try { localStorage.setItem('flappy_hi', hiScore); } catch(e) {}
  }
  document.getElementById('hi').textContent = hiScore;
  document.getElementById('best').textContent = hiScore;
  document.getElementById('level').textContent = levelVal;
}

function showGameOver() {
  document.getElementById('finalScore').textContent = scoreVal;
  document.getElementById('finalLevel').textContent = levelVal;
  document.getElementById('finalHi').textContent = hiScore;
  goSel = 0; updateGoSel();
  document.getElementById('gameOver').classList.remove('hidden');
}

// ── Input ──────────────────────────────────────────────────────────────────────
function tapAction() { flap(); }

document.addEventListener('keydown', e => {
  // Confirm dialog open
  if (!document.getElementById('confirmBox').classList.contains('hidden')) {
    if (e.key === 'ArrowLeft' || e.key === 'y' || e.key === 'Y') { e.preventDefault(); confirmSel=0; updateConfirmSel(); }
    else if (e.key === 'ArrowRight' || e.key === 'n' || e.key === 'N') { e.preventDefault(); confirmSel=1; updateConfirmSel(); }
    else if (e.key === 'Enter') { e.preventDefault(); if (confirmSel===0) window.location.href='index.html'; else hideConfirm(); }
    else if (e.key === 'Escape') { e.preventDefault(); hideConfirm(); }
    return;
  }
  // Game over navigation
  if (!document.getElementById('gameOver').classList.contains('hidden')) {
    if (e.key === 'ArrowDown' || e.key === 'ArrowUp') { e.preventDefault(); goSel = goSel===0 ? 1 : 0; updateGoSel(); return; }
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); if (goSel === 1) goMenu(); else goRetry(); return; }
    return;
  }
  // Start screen
  if (!document.getElementById('startScreen').classList.contains('hidden')) {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); document.getElementById('startScreen').classList.add('hidden'); startGame(); }
    return;
  }
  // Pause menu navigation
  if (paused) {
    if (e.key === 'ArrowDown' || e.key === 'ArrowUp') { e.preventDefault(); pauseSel = pauseSel===0 ? 1 : 0; updatePauseSel(); return; }
    if (e.key === 'Enter') { e.preventDefault(); if (pauseSel===1) showConfirm(); else togglePause(); return; }
    if (e.key === 'Escape' || e.key === 'p' || e.key === 'P') { e.preventDefault(); togglePause(); return; }
    return;
  }
  if (e.key === 'p' || e.key === 'P' || e.key === 'Escape') { e.preventDefault(); togglePause(); return; }
  if (!gameRunning || paused) return;
  switch(e.key) {
    case 'ArrowUp':
    case ' ':          e.preventDefault(); flap(); break;
  }
});

// ── Touch ──────────────────────────────────────────────────────────────────────
const bw = document.getElementById('boardWrap');
let tx, ty, tt;

bw.addEventListener('touchstart', e => {
  if (!gameRunning || paused || e.target.id === 'pauseBtn') return;
  e.preventDefault();
  const t = e.touches[0];
  tx = t.clientX; ty = t.clientY; tt = Date.now();
  flap();
}, { passive: false });

// ── Pause ──────────────────────────────────────────────────────────────────────
const pauseOv = document.getElementById('pauseOverlay');
let pauseSel = 0;
function updatePauseSel() { document.getElementById('resumeBtn').classList.toggle('sel', pauseSel === 0); document.getElementById('menuBtn').classList.toggle('sel', pauseSel === 1); }
function togglePause() {
  if (!gameRunning) return;
  paused = !paused;
  pauseOv.classList.toggle('hidden', !paused);
  if (!paused) { lastTime = 0; requestAnimationFrame(gameLoop); }
  else { pauseSel = 0; updatePauseSel(); }
}
document.getElementById('pauseBtn').addEventListener('click', e => { e.stopPropagation(); togglePause(); });
document.getElementById('pauseBtn').addEventListener('touchend', e => { e.stopPropagation(); e.preventDefault(); togglePause(); });
pauseOv.addEventListener('click', e => { if (!['resumeBtn','menuBtn','confirmYes','confirmNo'].includes(e.target.id) && !e.target.closest('#confirmBox')) togglePause(); });
pauseOv.addEventListener('touchend', e => { if (!['resumeBtn','menuBtn','confirmYes','confirmNo'].includes(e.target.id) && !e.target.closest('#confirmBox')) { e.preventDefault(); togglePause(); } });
['click', 'touchend'].forEach(ev => document.getElementById('resumeBtn').addEventListener(ev, e => { e.stopPropagation(); e.preventDefault(); togglePause(); }));
// Confirm exit
let confirmSel=0;
function showConfirm(){
  document.getElementById('confirmBox').classList.remove('hidden');
  confirmSel=0;updateConfirmSel();
}
function hideConfirm(){document.getElementById('confirmBox').classList.add('hidden');}
function updateConfirmSel(){
  document.getElementById('confirmYes').classList.toggle('sel',confirmSel===0);
  document.getElementById('confirmNo').classList.toggle('sel',confirmSel===1);
}
['click', 'touchend'].forEach(ev => document.getElementById('menuBtn').addEventListener(ev, e => { e.stopPropagation(); e.preventDefault(); showConfirm(); }));
['click', 'touchend'].forEach(ev => document.getElementById('confirmYes').addEventListener(ev, e => { e.stopPropagation(); e.preventDefault(); window.location.href = 'index.html'; }));
['click', 'touchend'].forEach(ev => document.getElementById('confirmNo').addEventListener(ev, e => { e.stopPropagation(); e.preventDefault(); hideConfirm(); }));

// ── Game over menu ─────────────────────────────────────────────────────────────
let goSel = 0;
function updateGoSel() { document.getElementById('goRetryBtn').classList.toggle('sel', goSel === 0); document.getElementById('goMenuBtn').classList.toggle('sel', goSel === 1); }
function goRetry() { document.getElementById('gameOver').classList.add('hidden'); startGame(); }
function goMenu() { window.location.href = 'index.html'; }
['click', 'touchend'].forEach(ev => document.getElementById('goRetryBtn').addEventListener(ev, e => { e.stopPropagation(); e.preventDefault(); goRetry(); }));
['click', 'touchend'].forEach(ev => document.getElementById('goMenuBtn').addEventListener(ev, e => { e.stopPropagation(); e.preventDefault(); goMenu(); }));

// ── Game loop ─────────────────────────────────────────────────────────────────
function gameLoop(time) {
  if (!gameRunning) { draw(); return; }
  if (paused) return;
  const dt = Math.min(time - (lastTime || time), 18); // cap at one 60fps frame
  lastTime = time;

  // Bird physics
  birdVel += GRAVITY * dt;
  birdY += birdVel * dt;

  // Move pipes
  const dist = curSpeed * dt;
  pipeTimer += dist;
  for (const p of pipes) p.x -= dist;

  // Spawn new pipes
  if (pipeTimer >= PIPE_SPACING) {
    spawnPipe();
    pipeTimer -= PIPE_SPACING;
  }

  // Remove offscreen pipes
  pipes = pipes.filter(p => p.x + PIPE_W > -10);

  // Score — bird passes pipe center
  for (const p of pipes) {
    if (!p.scored && p.x + PIPE_W < BIRD_X) {
      p.scored = true;
      scoreVal++;
      beep(660, 0.08);
      updateLevel();
      updateUI();
    }
  }

  // Collision
  if (checkCollision()) {
    die();
    draw();
    return;
  }

  draw();
  requestAnimationFrame(gameLoop);
}

// ── Start ─────────────────────────────────────────────────────────────────────
function startGame() {
  scoreVal = 0; gameRunning = true; paused = false; lastTime = 0;
  try { hiScore = parseInt(localStorage.getItem('flappy_hi')) || 0; } catch(e) { hiScore = 0; }
  birdY = CANVAS_H / 2 - BIRD_H / 2;
  birdVel = 0;
  pipes = [];
  pipeTimer = PIPE_SPACING - 80; // first pipe comes soon
  deadTimer = 0;
  levelVal = 0; curSpeed = BASE_PIPE_SPEED; curGap = PIPE_GAP;
  rand = mulberry32(12345);
  updateLevel();
  updateUI(); draw();
  requestAnimationFrame(gameLoop);
}

['click', 'touchend'].forEach(ev => {
  document.getElementById('startScreen').addEventListener(ev, e => {
    e.preventDefault(); document.getElementById('startScreen').classList.add('hidden'); startGame();
  });
});

// ── Resize ────────────────────────────────────────────────────────────────────
function resize() {
  const wrap = document.getElementById('boardWrap');
  const tb = document.querySelector('.topbar'), th = document.querySelector('.touch-hint');
  const aH = window.innerHeight - (tb ? tb.offsetHeight : 0) - (th ? th.offsetHeight : 0), aW = window.innerWidth;
  const aspect = CANVAS_H / CANVAS_W;
  let h = aH, w = h / aspect;
  if (w > aW) { w = aW; h = w * aspect; }
  canvas.style.width = Math.floor(w) + 'px';
  canvas.style.height = Math.floor(h) + 'px';
  document.getElementById('gameUI').style.width = Math.floor(w) + 'px';
}
window.addEventListener('resize', resize);
setTimeout(resize, 50); setTimeout(resize, 200); resize();

document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
drawBackground();
</script>
