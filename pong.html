<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PONG">
<title>PONG</title>
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--g:#33ff33;--gd:#1a8c1a;--bg:#070707;--glow:rgba(51,255,51,0.12);--amber:#ffaa00}
html,body{
  height:100%;height:100dvh;overflow:hidden;background:#000;touch-action:none;
  -webkit-user-select:none;user-select:none;-webkit-touch-callout:none;
  -webkit-tap-highlight-color:transparent;
}
body{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:'Press Start 2P',monospace;
  background:radial-gradient(ellipse at center,#0d0d0d 0%,#000 80%);color:var(--g);
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}
.crt::before{
  content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px);
  pointer-events:none;z-index:1000;
}
.crt::after{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,0.65) 100%);
  pointer-events:none;z-index:1001;
}
@keyframes titleGlow{
  0%,100%{text-shadow:0 0 2px #fff,0 0 8px var(--g),0 0 20px rgba(51,255,51,0.25)}
  50%{text-shadow:0 0 4px #fff,0 0 12px var(--g),0 0 30px rgba(51,255,51,0.35)}
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

.game-container{
  display:flex;flex-direction:column;align-items:center;
  width:100%;height:100%;height:100dvh;position:relative;
}
.topbar{
  display:flex;justify-content:space-between;align-items:center;
  width:100%;padding:6px 12px;flex-shrink:0;z-index:10;
}
.topbar-left{display:flex;flex-direction:column;gap:2px}
.title{font-size:14px;letter-spacing:4px;animation:titleGlow 3s ease-in-out infinite}
.score-text{font-size:7px;text-shadow:0 0 4px var(--g);line-height:1.8}
.score-text span{color:var(--amber);text-shadow:0 0 4px var(--amber)}
.topbar-right{display:flex;align-items:center;gap:8px}
.stat-box{text-align:center}
.stat-lbl{font-size:5px;letter-spacing:1px;opacity:0.6;text-shadow:0 0 3px var(--g)}
.stat-val{font-size:9px;color:var(--amber);text-shadow:0 0 5px var(--amber)}

.board-wrap{
  flex:1;display:flex;align-items:center;justify-content:center;
  width:100%;position:relative;padding:4px;
}
canvas#board{
  border:2px solid var(--gd);
  box-shadow:0 0 15px var(--glow),inset 0 0 25px rgba(0,0,0,0.4);
  image-rendering:pixelated;border-radius:2px;
}
.touch-hint{
  font-size:5px;letter-spacing:1px;opacity:0.3;text-align:center;
  padding:4px 0 8px 0;flex-shrink:0;text-shadow:0 0 3px var(--g);
}
.pause-btn{
  font-family:'Press Start 2P',monospace;font-size:9px;color:var(--gd);
  background:none;border:1px solid var(--gd);padding:8px 12px;border-radius:3px;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
}
.pause-btn:active{color:var(--g);border-color:var(--g)}

.overlay{
  position:fixed;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:rgba(0,0,0,0.88);z-index:500;gap:16px;text-align:center;
}
.overlay h1{font-size:22px;letter-spacing:5px;animation:titleGlow 2s ease-in-out infinite;color:#d0ffd0}
.overlay h2{font-size:13px;color:var(--amber);text-shadow:0 0 8px var(--amber)}
.overlay .sub{font-size:7px;line-height:2.4;opacity:0.7}
.overlay .start-hint{font-size:8px;animation:blink 1.2s step-end infinite;margin-top:12px}
.overlay .final-score{font-size:9px;line-height:2.4}
.overlay .final-score span{color:var(--amber);text-shadow:0 0 6px var(--amber)}
.hidden{display:none !important}
.pause-overlay{
  position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(0,0,0,0.85);z-index:400;gap:24px;
}
.pause-overlay .pause-text{font-size:14px;letter-spacing:4px;animation:blink 1.5s step-end infinite}
.pause-menu-btn{
  font-family:'Press Start 2P',monospace;font-size:8px;color:var(--gd);
  background:none;border:1px solid var(--gd);padding:10px 16px;border-radius:3px;
  cursor:pointer;-webkit-tap-highlight-color:transparent;letter-spacing:2px;
}
.pause-menu-btn:active{color:var(--g);border-color:var(--g)}
.pause-menu-btn.sel{color:var(--amber);border-color:var(--amber);text-shadow:0 0 6px var(--amber)}
.confirm-box{display:flex;flex-direction:column;align-items:center;gap:16px;padding:24px;border:1px solid var(--gd);background:rgba(7,7,7,0.95)}
.confirm-q{font-size:8px;letter-spacing:2px;line-height:2}
.confirm-btns{display:flex;gap:16px}
.confirm-yes,.confirm-no{font-family:'Press Start 2P',monospace;font-size:8px;padding:10px 18px;border-radius:3px;cursor:pointer;-webkit-tap-highlight-color:transparent;letter-spacing:2px;background:none}
.confirm-yes{color:var(--amber);border:1px solid var(--amber)}
.confirm-no{color:var(--gd);border:1px solid var(--gd)}
.confirm-yes.sel,.confirm-yes:active{background:rgba(255,170,0,0.15);color:#fff;border-color:#fff}
.confirm-no.sel,.confirm-no:active{background:rgba(51,255,51,0.1);color:var(--g);border-color:var(--g)}
</style>
</head>
<body class="crt">

<!-- Start screen -->
<div class="overlay" id="startScreen">
  <h1>PONG</h1>
  <div class="sub">← → SWIPE MOVE PADDLE<br>FIRST TO 7 WINS<br>BEAT THE CPU!</div>
  <div class="start-hint">TAP TO START</div>
</div>

<!-- Game over -->
<div class="overlay hidden" id="gameOver">
  <h2 id="goTitle">GAME OVER</h2>
  <div class="final-score">
    YOU <span id="finalPlayer">0</span> — <span id="finalCpu">0</span> CPU
  </div>
  <div class="final-score">TOTAL SCORE <span id="finalScore">0</span></div>
  <div class="start-hint">TAP TO RETRY</div>
</div>

<!-- Game -->
<div class="game-container" id="gameUI">
  <div class="topbar">
    <div class="topbar-left">
      <div class="title">PONG</div>
      <div class="score-text">SCORE <span id="score">0</span> &nbsp;HI <span id="hi">0</span></div>
    </div>
    <button class="pause-btn" id="pauseBtn">PAUSE</button>
    <div class="topbar-right">
      <div class="stat-box"><div class="stat-lbl">YOU</div><div class="stat-val" id="playerWins">0</div></div>
      <div class="stat-box"><div class="stat-lbl">CPU</div><div class="stat-val" id="cpuWins">0</div></div>
    </div>
  </div>
  <div class="board-wrap" id="boardWrap">
    <canvas id="board" width="300" height="450"></canvas>
  </div>
  <div class="touch-hint">SWIPE ←→ MOVE PADDLE</div>
</div>

<!-- Pause overlay -->
<div class="pause-overlay hidden" id="pauseOverlay">
  <div class="pause-text">PAUSE</div>
  <button class="pause-menu-btn" id="resumeBtn">RESUME</button>
  <button class="pause-menu-btn" id="menuBtn">EXIT TO MENU</button>
  <div class="confirm-box hidden" id="confirmBox">
    <div class="confirm-q">EXIT TO MENU?</div>
    <div class="confirm-btns">
      <button class="confirm-yes sel" id="confirmYes">YES</button>
      <button class="confirm-no" id="confirmNo">NO</button>
    </div>
  </div>
</div>

<script>
// ── Constants ─────────────────────────────────────────────────────────────────
const CANVAS_W = 300, CANVAS_H = 450;
const PADDLE_W = 56, PADDLE_H = 8, PADDLE_EDGE = 16;
const BALL_SIZE = 6;
const WIN_SCORE = 7;
const BALL_BASE_SPEED = 0.22; // px/ms
const BALL_SPEED_INC = 0.012; // per rally hit
const BALL_MAX_SPEED = 0.42;
const CPU_BASE_SPEED = 0.14; // px/ms
const CPU_SPEED_INC = 0.008; // per point scored by player
const SERVE_DELAY = 800; // ms before auto-serve

// ── State ─────────────────────────────────────────────────────────────────────
let scoreVal, hiScore, gameRunning, paused, lastTime;
let playerX, cpuX; // paddle center X
let ballX, ballY, ballVX, ballVY, ballSpeed;
let playerPts, cpuPts;
let rallyHits;
let serving, serveTimer, serveDir; // 1=toward player, -1=toward cpu
let keysDown = {};

// ── Canvas ────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');

// ── Audio ─────────────────────────────────────────────────────────────────────
let audioCtx;
function beep(freq, duration, volume = 0.08) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = 'square'; o.frequency.value = freq; g.gain.value = volume;
    o.connect(g); g.connect(audioCtx.destination);
    o.start();
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    o.stop(audioCtx.currentTime + duration);
  } catch(e) {}
}

// ── Game logic ────────────────────────────────────────────────────────────────
function resetBall(dir) {
  ballX = CANVAS_W / 2;
  ballY = CANVAS_H / 2;
  ballVX = 0; ballVY = 0;
  ballSpeed = BALL_BASE_SPEED;
  rallyHits = 0;
  serving = true;
  serveDir = dir;
  serveTimer = SERVE_DELAY;
}

function serveBall() {
  const angle = (Math.random() * 0.8 - 0.4); // -0.4 to 0.4 rad
  ballVX = Math.sin(angle);
  ballVY = serveDir * Math.cos(angle); // negative = up (toward cpu)
  const mag = Math.sqrt(ballVX * ballVX + ballVY * ballVY);
  ballVX = (ballVX / mag);
  ballVY = (ballVY / mag);
  serving = false;
}

function clampPaddle(x) {
  const half = PADDLE_W / 2;
  if (x < half) return half;
  if (x > CANVAS_W - half) return CANVAS_W - half;
  return x;
}

function updateBall(dt) {
  if (serving) {
    serveTimer -= dt;
    if (serveTimer <= 0) serveBall();
    return;
  }

  const speed = Math.min(ballSpeed + rallyHits * BALL_SPEED_INC, BALL_MAX_SPEED);
  ballX += ballVX * speed * dt;
  ballY += ballVY * speed * dt;

  // Wall bounce
  if (ballX - BALL_SIZE / 2 <= 0) { ballX = BALL_SIZE / 2; ballVX = Math.abs(ballVX); beep(300, 0.03); }
  if (ballX + BALL_SIZE / 2 >= CANVAS_W) { ballX = CANVAS_W - BALL_SIZE / 2; ballVX = -Math.abs(ballVX); beep(300, 0.03); }

  // Player paddle (bottom)
  const playerTop = CANVAS_H - PADDLE_EDGE - PADDLE_H;
  if (ballVY > 0 && ballY + BALL_SIZE / 2 >= playerTop && ballY - BALL_SIZE / 2 < playerTop + PADDLE_H) {
    if (ballX >= playerX - PADDLE_W / 2 - BALL_SIZE / 2 && ballX <= playerX + PADDLE_W / 2 + BALL_SIZE / 2) {
      ballY = playerTop - BALL_SIZE / 2;
      // Angle based on hit position
      const hit = (ballX - playerX) / (PADDLE_W / 2); // -1 to 1
      const angle = hit * 1.1; // max ~63 degrees
      ballVX = Math.sin(angle);
      ballVY = -Math.cos(angle);
      const mag = Math.sqrt(ballVX * ballVX + ballVY * ballVY);
      ballVX /= mag; ballVY /= mag;
      rallyHits++;
      beep(440, 0.05);
    }
  }

  // CPU paddle (top)
  const cpuBottom = PADDLE_EDGE + PADDLE_H;
  if (ballVY < 0 && ballY - BALL_SIZE / 2 <= cpuBottom && ballY + BALL_SIZE / 2 > PADDLE_EDGE) {
    if (ballX >= cpuX - PADDLE_W / 2 - BALL_SIZE / 2 && ballX <= cpuX + PADDLE_W / 2 + BALL_SIZE / 2) {
      ballY = cpuBottom + BALL_SIZE / 2;
      const hit = (ballX - cpuX) / (PADDLE_W / 2);
      const angle = hit * 1.1;
      ballVX = Math.sin(angle);
      ballVY = Math.cos(angle);
      const mag = Math.sqrt(ballVX * ballVX + ballVY * ballVY);
      ballVX /= mag; ballVY /= mag;
      rallyHits++;
      beep(330, 0.05);
    }
  }

  // Score — ball goes off screen
  if (ballY - BALL_SIZE / 2 > CANVAS_H + 10) {
    // CPU scores
    cpuPts++;
    beep(150, 0.2);
    updateUI();
    if (cpuPts >= WIN_SCORE) { endMatch(); return; }
    resetBall(-1); // serve toward cpu
  }
  if (ballY + BALL_SIZE / 2 < -10) {
    // Player scores
    playerPts++;
    scoreVal += 10 + rallyHits * 2;
    beep(660, 0.1);
    updateUI();
    if (playerPts >= WIN_SCORE) { endMatch(); return; }
    resetBall(1); // serve toward player
  }
}

function updateCPU(dt) {
  if (serving && serveDir < 0) return; // cpu waits while serving toward it? No, move anyway
  const cpuSpeed = Math.min(CPU_BASE_SPEED + playerPts * CPU_SPEED_INC, 0.28);
  let targetX = ballX;
  // Add slight prediction error
  if (ballVY < 0) {
    // Ball coming toward CPU — track more precisely
    targetX = ballX + ballVX * (ballY - PADDLE_EDGE - PADDLE_H) / Math.max(0.1, -ballVY) * 0.3;
  } else {
    // Ball going away — drift toward center
    targetX = CANVAS_W / 2;
  }
  const diff = targetX - cpuX;
  const maxMove = cpuSpeed * dt;
  if (Math.abs(diff) > 2) {
    cpuX += Math.sign(diff) * Math.min(Math.abs(diff), maxMove);
  }
  cpuX = clampPaddle(cpuX);
}

function endMatch() {
  gameRunning = false;
  if (playerPts >= WIN_SCORE) {
    scoreVal += 50; // bonus for winning
    document.getElementById('goTitle').textContent = 'YOU WIN!';
  } else {
    document.getElementById('goTitle').textContent = 'GAME OVER';
  }
  updateUI();
  document.getElementById('finalPlayer').textContent = playerPts;
  document.getElementById('finalCpu').textContent = cpuPts;
  document.getElementById('finalScore').textContent = scoreVal;
  document.getElementById('gameOver').classList.remove('hidden');
  beep(playerPts >= WIN_SCORE ? 880 : 100, 0.4);
}

// ── Drawing ───────────────────────────────────────────────────────────────────
function draw() {
  ctx.fillStyle = '#070707';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  // Center dashed line
  ctx.strokeStyle = 'rgba(26,140,26,0.35)';
  ctx.lineWidth = 2;
  ctx.setLineDash([8, 8]);
  ctx.beginPath();
  ctx.moveTo(0, CANVAS_H / 2);
  ctx.lineTo(CANVAS_W, CANVAS_H / 2);
  ctx.stroke();
  ctx.setLineDash([]);

  // Score display on field
  ctx.font = '28px "Press Start 2P"';
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(26,140,26,0.2)';
  ctx.fillText(playerPts || '0', CANVAS_W / 4, CANVAS_H / 2 + 60);
  ctx.fillText(cpuPts || '0', CANVAS_W * 3 / 4, CANVAS_H / 2 - 40);

  // Player paddle (bottom)
  drawPaddle(playerX, CANVAS_H - PADDLE_EDGE - PADDLE_H, '#33ff33');

  // CPU paddle (top)
  drawPaddle(cpuX, PADDLE_EDGE, '#33dd33');

  // Ball
  if (!serving || Math.floor(Date.now() / 200) % 2 === 0) {
    const bx = Math.floor(ballX - BALL_SIZE / 2);
    const by = Math.floor(ballY - BALL_SIZE / 2);
    ctx.fillStyle = '#33ff33';
    ctx.fillRect(bx, by, BALL_SIZE, BALL_SIZE);
    // Highlight
    ctx.fillStyle = 'rgba(102,255,102,0.5)';
    ctx.fillRect(bx, by, BALL_SIZE, 1);
    ctx.fillRect(bx, by, 1, BALL_SIZE);
    // Shadow
    ctx.fillStyle = 'rgba(0,80,0,0.4)';
    ctx.fillRect(bx + BALL_SIZE - 1, by + 1, 1, BALL_SIZE - 1);
    ctx.fillRect(bx + 1, by + BALL_SIZE - 1, BALL_SIZE - 1, 1);
    // Glow
    ctx.shadowColor = '#33ff33';
    ctx.shadowBlur = 8;
    ctx.fillStyle = 'rgba(51,255,51,0.3)';
    ctx.fillRect(bx - 2, by - 2, BALL_SIZE + 4, BALL_SIZE + 4);
    ctx.shadowBlur = 0;
  }

  // Serve hint
  if (serving) {
    ctx.font = '6px "Press Start 2P"';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(51,255,51,0.4)';
    ctx.fillText('GET READY', CANVAS_W / 2, CANVAS_H / 2 + 4);
  }
}

function drawPaddle(cx, y, color) {
  const px = Math.floor(cx - PADDLE_W / 2);
  ctx.fillStyle = color;
  ctx.fillRect(px + 1, y + 1, PADDLE_W - 2, PADDLE_H - 2);
  // Highlight
  ctx.fillStyle = 'rgba(200,255,200,0.35)';
  ctx.fillRect(px + 1, y + 1, PADDLE_W - 2, 2);
  ctx.fillRect(px + 1, y + 1, 2, PADDLE_H - 2);
  // Shadow
  ctx.fillStyle = 'rgba(0,60,0,0.4)';
  ctx.fillRect(px + PADDLE_W - 3, y + 2, 2, PADDLE_H - 2);
  ctx.fillRect(px + 2, y + PADDLE_H - 3, PADDLE_W - 3, 2);
}

// ── UI ────────────────────────────────────────────────────────────────────────
function updateUI() {
  document.getElementById('score').textContent = scoreVal;
  if (scoreVal > hiScore) {
    hiScore = scoreVal;
    try { localStorage.setItem('pong_hi', hiScore); } catch(e) {}
  }
  document.getElementById('hi').textContent = hiScore;
  document.getElementById('playerWins').textContent = playerPts;
  document.getElementById('cpuWins').textContent = cpuPts;
}

// ── Input ─────────────────────────────────────────────────────────────────────
const PLAYER_SPEED = 0.3; // px/ms

function tapAction() { /* no tap action needed in pong */ }

function handleKeys(dt) {
  if (!gameRunning || paused) return;
  const move = PLAYER_SPEED * dt;
  if (keysDown['ArrowLeft'])  playerX = clampPaddle(playerX - move);
  if (keysDown['ArrowRight']) playerX = clampPaddle(playerX + move);
}

document.addEventListener('keydown', e => {
  // Confirm dialog open
  if (!document.getElementById('confirmBox').classList.contains('hidden')) {
    if (e.key === 'ArrowLeft' || e.key === 'y' || e.key === 'Y') { e.preventDefault(); confirmSel=0; updateConfirmSel(); }
    else if (e.key === 'ArrowRight' || e.key === 'n' || e.key === 'N') { e.preventDefault(); confirmSel=1; updateConfirmSel(); }
    else if (e.key === 'Enter') { e.preventDefault(); if (confirmSel===0) window.location.href='index.html'; else hideConfirm(); }
    else if (e.key === 'Escape') { e.preventDefault(); hideConfirm(); }
    return;
  }
  // Pause menu navigation
  if (paused) {
    if (e.key === 'ArrowDown' || e.key === 'ArrowUp') { e.preventDefault(); pauseSel = pauseSel===0 ? 1 : 0; updatePauseSel(); return; }
    if (e.key === 'Enter') { e.preventDefault(); if (pauseSel===1) showConfirm(); else togglePause(); return; }
    if (e.key === 'Escape' || e.key === 'p' || e.key === 'P') { e.preventDefault(); togglePause(); return; }
    return;
  }
  if (e.key === 'p' || e.key === 'P' || e.key === 'Escape') { e.preventDefault(); togglePause(); return; }
  if (!gameRunning || paused) return;
  if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
    e.preventDefault();
    keysDown[e.key] = true;
  }
});

document.addEventListener('keyup', e => {
  keysDown[e.key] = false;
});

// ── Touch ─────────────────────────────────────────────────────────────────────
const bw = document.getElementById('boardWrap');
let tx, ty, tt, moved, lastMX, startY;

bw.addEventListener('touchstart', e => {
  if (!gameRunning || paused || e.target.id === 'pauseBtn') return;
  e.preventDefault();
  const t = e.touches[0];
  tx = t.clientX; ty = t.clientY; startY = t.clientY; tt = Date.now();
  moved = false; lastMX = tx;
}, { passive: false });

bw.addEventListener('touchmove', e => {
  if (!gameRunning || paused) return;
  e.preventDefault();
  const t = e.touches[0];
  const dx = t.clientX - lastMX;
  const scale = CANVAS_W / canvas.offsetWidth;
  playerX = clampPaddle(playerX + dx * scale);
  lastMX = t.clientX;
  if (Math.abs(t.clientX - tx) > 8) moved = true;
}, { passive: false });

bw.addEventListener('touchend', e => {
  if (!gameRunning || paused) return;
  e.preventDefault();
  const el = Date.now() - tt, ct = e.changedTouches[0];
  const fdx = ct.clientX - tx;
  if (!moved && el < 250 && Math.abs(fdx) < 12 && Math.abs(ct.clientY - startY) < 12) tapAction();
}, { passive: false });

// ── Pause ─────────────────────────────────────────────────────────────────────
const pauseOv = document.getElementById('pauseOverlay');
let pauseSel = 0;
function updatePauseSel() { document.getElementById('resumeBtn').classList.toggle('sel', pauseSel === 0); document.getElementById('menuBtn').classList.toggle('sel', pauseSel === 1); }
function togglePause() {
  if (!gameRunning) return;
  paused = !paused;
  pauseOv.classList.toggle('hidden', !paused);
  if (!paused) { keysDown = {}; lastTime = 0; requestAnimationFrame(gameLoop); }
  else { pauseSel = 0; updatePauseSel(); }
}
document.getElementById('pauseBtn').addEventListener('click', e => { e.stopPropagation(); togglePause(); });
document.getElementById('pauseBtn').addEventListener('touchend', e => { e.stopPropagation(); e.preventDefault(); togglePause(); });
pauseOv.addEventListener('click', e => { if (!['resumeBtn','menuBtn','confirmYes','confirmNo'].includes(e.target.id) && !e.target.closest('#confirmBox')) togglePause(); });
pauseOv.addEventListener('touchend', e => { if (!['resumeBtn','menuBtn','confirmYes','confirmNo'].includes(e.target.id) && !e.target.closest('#confirmBox')) { e.preventDefault(); togglePause(); } });
['click', 'touchend'].forEach(ev => document.getElementById('resumeBtn').addEventListener(ev, e => { e.stopPropagation(); e.preventDefault(); togglePause(); }));
// Confirm exit
let confirmSel=0;
function showConfirm(){
  document.getElementById('confirmBox').classList.remove('hidden');
  confirmSel=0;updateConfirmSel();
}
function hideConfirm(){document.getElementById('confirmBox').classList.add('hidden');}
function updateConfirmSel(){
  document.getElementById('confirmYes').classList.toggle('sel',confirmSel===0);
  document.getElementById('confirmNo').classList.toggle('sel',confirmSel===1);
}
['click', 'touchend'].forEach(ev => document.getElementById('menuBtn').addEventListener(ev, e => { e.stopPropagation(); e.preventDefault(); showConfirm(); }));
['click', 'touchend'].forEach(ev => document.getElementById('confirmYes').addEventListener(ev, e => { e.stopPropagation(); e.preventDefault(); window.location.href = 'index.html'; }));
['click', 'touchend'].forEach(ev => document.getElementById('confirmNo').addEventListener(ev, e => { e.stopPropagation(); e.preventDefault(); hideConfirm(); }));

// ── Game loop ─────────────────────────────────────────────────────────────────
function gameLoop(time) {
  if (!gameRunning) { draw(); return; }
  if (paused) return;
  const dt = Math.min(time - (lastTime || time), 32); // cap dt
  lastTime = time;
  handleKeys(dt);
  updateBall(dt);
  updateCPU(dt);
  draw();
  requestAnimationFrame(gameLoop);
}

// ── Start ─────────────────────────────────────────────────────────────────────
function startGame() {
  scoreVal = 0; gameRunning = true; paused = false; lastTime = 0;
  try { hiScore = parseInt(localStorage.getItem('pong_hi')) || 0; } catch(e) { hiScore = 0; }
  playerX = CANVAS_W / 2;
  cpuX = CANVAS_W / 2;
  playerPts = 0; cpuPts = 0;
  keysDown = {};
  resetBall(-1); // first serve toward cpu
  updateUI(); draw();
  requestAnimationFrame(gameLoop);
}

['click', 'touchend'].forEach(ev => {
  document.getElementById('startScreen').addEventListener(ev, e => {
    e.preventDefault(); document.getElementById('startScreen').classList.add('hidden'); startGame();
  });
  document.getElementById('gameOver').addEventListener(ev, e => {
    e.preventDefault(); document.getElementById('gameOver').classList.add('hidden'); startGame();
  });
});

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ' ') {
    const s = document.getElementById('startScreen'), o = document.getElementById('gameOver');
    if (!s.classList.contains('hidden')) { e.preventDefault(); s.classList.add('hidden'); startGame(); }
    else if (!o.classList.contains('hidden')) { e.preventDefault(); o.classList.add('hidden'); startGame(); }
  }
});

// ── Resize ────────────────────────────────────────────────────────────────────
function resize() {
  const wrap = document.getElementById('boardWrap');
  const aH = wrap.clientHeight - 8, aW = wrap.clientWidth - 8;
  const aspect = CANVAS_H / CANVAS_W;
  let h = aH, w = h / aspect;
  if (w > aW) { w = aW; h = w * aspect; }
  canvas.style.width = Math.floor(w) + 'px';
  canvas.style.height = Math.floor(h) + 'px';
}
window.addEventListener('resize', resize);
setTimeout(resize, 50); setTimeout(resize, 200); resize();

document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
ctx.fillStyle = '#070707'; ctx.fillRect(0, 0, canvas.width, canvas.height);
</script>
